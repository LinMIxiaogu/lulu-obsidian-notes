<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="520" height="300" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <text x="260" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Agents-as-Tools 层次化编排</text>

  <!-- 主Agent -->
  <rect x="170" y="48" width="180" height="42" rx="8" fill="#1e293b"/>
  <text x="260" y="66" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">主 Agent（Orchestrator）</text>
  <text x="260" y="82" text-anchor="middle" font-size="10" fill="#e2e8f0">任务理解与分发</text>

  <!-- 分支线 -->
  <line x1="260" y1="90" x2="260" y2="105" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="75" y1="105" x2="445" y2="105" stroke="#94a3b8" stroke-width="1.5"/>

  <line x1="75" y1="105" x2="75" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a7)"/>
  <line x1="200" y1="105" x2="200" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a7)"/>
  <line x1="320" y1="105" x2="320" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a7)"/>
  <line x1="445" y1="105" x2="445" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a7)"/>

  <!-- Tool 1: search_agent -->
  <rect x="20" y="123" width="110" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="75" y="143" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">search_agent</text>
  <text x="75" y="159" text-anchor="middle" font-size="9" fill="#475569">独立 Prompt</text>
  <text x="75" y="173" text-anchor="middle" font-size="9" fill="#475569">独立工具集</text>

  <!-- 子Agent的工具 -->
  <line x1="75" y1="183" x2="75" y2="195" stroke="#94a3b8" stroke-width="1" marker-end="url(#a7)"/>
  <rect x="35" y="198" width="80" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="75" y="215" text-anchor="middle" font-size="9" fill="#475569">向量DB / Web</text>

  <!-- Tool 2: code_agent -->
  <rect x="145" y="123" width="110" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="143" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">code_agent</text>
  <text x="200" y="159" text-anchor="middle" font-size="9" fill="#475569">独立 Prompt</text>
  <text x="200" y="173" text-anchor="middle" font-size="9" fill="#475569">代码沙箱</text>

  <line x1="200" y1="183" x2="200" y2="195" stroke="#94a3b8" stroke-width="1" marker-end="url(#a7)"/>
  <rect x="160" y="198" width="80" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="200" y="215" text-anchor="middle" font-size="9" fill="#475569">Python / SQL</text>

  <!-- Tool 3: analysis_agent -->
  <rect x="265" y="123" width="110" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="320" y="143" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">analysis_agent</text>
  <text x="320" y="159" text-anchor="middle" font-size="9" fill="#475569">独立 Prompt</text>
  <text x="320" y="173" text-anchor="middle" font-size="9" fill="#475569">数据分析工具</text>

  <line x1="320" y1="183" x2="320" y2="195" stroke="#94a3b8" stroke-width="1" marker-end="url(#a7)"/>
  <rect x="280" y="198" width="80" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="320" y="215" text-anchor="middle" font-size="9" fill="#475569">图表 / 统计</text>

  <!-- Tool 4: 普通工具 -->
  <rect x="390" y="123" width="110" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4,3"/>
  <text x="445" y="143" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">get_weather</text>
  <text x="445" y="163" text-anchor="middle" font-size="9" fill="#475569">普通工具函数</text>
  <text x="445" y="177" text-anchor="middle" font-size="9" fill="#475569">（非 Agent）</text>

  <!-- 嵌套Agent Loop标注 -->
  <rect x="20" y="234" width="250" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="145" y="253" text-anchor="middle" font-size="10" fill="#475569">子 Agent 有独立的 Agent Loop（嵌套循环）</text>

  <!-- 优劣势 -->
  <rect x="20" y="270" width="480" height="24" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="260" y="287" text-anchor="middle" font-size="10" fill="#475569">优势: 模块化 + 专业化 + 可扩展 | 劣势: 延迟叠加 + 调试困难 + Token 消耗大</text>

  <defs>
    <marker id="a7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>