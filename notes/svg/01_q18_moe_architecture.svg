<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="900" height="480" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">MoE (Mixture of Experts) 架构</text>

  <!-- Input -->
  <rect x="370" y="55" width="160" height="30" rx="6" fill="#1e293b"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" fill="#ffffff">输入 Token (x)</text>

  <!-- Arrow down to router -->
  <line x1="450" y1="85" x2="450" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Router -->
  <rect x="340" y="110" width="220" height="40" rx="6" fill="#1e293b"/>
  <text x="450" y="136" text-anchor="middle" font-size="13" fill="#ffffff">门控网络 (Router/Gate)</text>
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="#475569">G(x) = TopK(softmax(W_g * x))</text>

  <!-- Fan out arrows to experts -->
  <line x1="350" y1="150" x2="100" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="150" x2="280" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="150" x2="620" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="150" x2="800" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Experts -->
  <rect x="40" y="200" width="120" height="50" rx="6" fill="#1e293b"/>
  <text x="100" y="222" text-anchor="middle" font-size="12" fill="#ffffff">Expert 1</text>
  <text x="100" y="240" text-anchor="middle" font-size="10" fill="#ffffff">(FFN)</text>
  <text x="100" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">w=0.7</text>

  <rect x="220" y="200" width="120" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4,3"/>
  <text x="280" y="222" text-anchor="middle" font-size="12" fill="#94a3b8">Expert 2</text>
  <text x="280" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">(未激活)</text>

  <text x="450" y="230" text-anchor="middle" font-size="16" fill="#94a3b8">...</text>

  <rect x="560" y="200" width="120" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4,3"/>
  <text x="620" y="222" text-anchor="middle" font-size="12" fill="#94a3b8">Expert N-1</text>
  <text x="620" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">(未激活)</text>

  <rect x="740" y="200" width="120" height="50" rx="6" fill="#1e293b"/>
  <text x="800" y="222" text-anchor="middle" font-size="12" fill="#ffffff">Expert N</text>
  <text x="800" y="240" text-anchor="middle" font-size="10" fill="#ffffff">(FFN)</text>
  <text x="800" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">w=0.3</text>

  <!-- Converge arrows -->
  <line x1="100" y1="250" x2="400" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="800" y1="250" x2="500" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sum -->
  <rect x="370" y="295" width="160" height="30" rx="6" fill="#1e293b"/>
  <text x="450" y="315" text-anchor="middle" font-size="13" fill="#ffffff">加权求和输出</text>

  <!-- Key info boxes -->
  <g transform="translate(30,350)">
    <rect width="260" height="110" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="130" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">核心思想</text>
    <text x="15" y="44" font-size="11" fill="#475569">N 个专家只激活 K 个</text>
    <text x="15" y="62" font-size="11" fill="#475569">参数量大但计算量小</text>
    <text x="15" y="80" font-size="11" fill="#475569">激活比 = K/N (如 2/8=25%)</text>
    <text x="15" y="98" font-size="11" fill="#475569">需要负载均衡防止专家坍塌</text>
  </g>

  <g transform="translate(320,350)">
    <rect width="260" height="110" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="130" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">门控方案</text>
    <text x="15" y="44" font-size="11" fill="#475569">Top-K Softmax (基础)</text>
    <text x="15" y="62" font-size="11" fill="#475569">Switch: Top-1 极简路由</text>
    <text x="15" y="80" font-size="11" fill="#475569">Expert Choice: 专家选token</text>
    <text x="15" y="98" font-size="11" fill="#475569">DeepSeek: 共享+路由专家</text>
  </g>

  <g transform="translate(610,350)">
    <rect width="260" height="110" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="130" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">代表模型</text>
    <text x="15" y="44" font-size="11" fill="#475569">Mixtral 8x7B: 46.7B/12.9B</text>
    <text x="15" y="62" font-size="11" fill="#475569">DeepSeek-V2: 236B/21B</text>
    <text x="15" y="80" font-size="11" fill="#475569">DeepSeek-V3: 671B/37B</text>
    <text x="15" y="98" font-size="11" fill="#475569">(总参数/激活参数)</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>