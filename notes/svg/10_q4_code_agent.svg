<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 750">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1150" height="750" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="375" y="15" width="400" height="40" rx="8" fill="#1e293b"/>
  <text x="575" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">代码助手 Agent 架构</text>

  <!-- ===== IDE插件层 ===== -->
  <rect x="350" y="70" width="450" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="575" y="95" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">IDE 插件 (VS Code / JetBrains / Vim)</text>

  <line x1="575" y1="110" x2="575" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 代码上下文引擎 (最核心) ===== -->
  <rect x="50" y="140" width="1050" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="165" fill="#1e293b" font-size="14" font-weight="bold">代码上下文引擎 (核心差异化能力)</text>

  <rect x="80" y="178" width="180" height="65" rx="6" fill="#1e293b"/>
  <text x="170" y="200" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">当前文件上下文</text>
  <text x="170" y="216" text-anchor="middle" fill="#ffffff" font-size="10">光标前后各200行</text>
  <text x="170" y="230" text-anchor="middle" fill="#ffffff" font-size="10">当前函数完整代码</text>

  <rect x="290" y="178" width="180" height="65" rx="6" fill="#1e293b"/>
  <text x="380" y="200" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">项目级上下文</text>
  <text x="380" y="216" text-anchor="middle" fill="#ffffff" font-size="10">Tree-sitter 解析结构</text>
  <text x="380" y="230" text-anchor="middle" fill="#ffffff" font-size="10">Repository Map 索引</text>

  <rect x="500" y="178" width="180" height="65" rx="6" fill="#1e293b"/>
  <text x="590" y="200" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Code RAG</text>
  <text x="590" y="216" text-anchor="middle" fill="#ffffff" font-size="10">代码 Embedding 检索</text>
  <text x="590" y="230" text-anchor="middle" fill="#ffffff" font-size="10">相似代码作 Few-shot</text>

  <rect x="710" y="178" width="180" height="65" rx="6" fill="#1e293b"/>
  <text x="800" y="200" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">依赖关系图</text>
  <text x="800" y="216" text-anchor="middle" fill="#ffffff" font-size="10">import / 调用关系</text>
  <text x="800" y="230" text-anchor="middle" fill="#ffffff" font-size="10">框架 / 技术栈识别</text>

  <rect x="920" y="178" width="150" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="995" y="200" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">MCP 协议</text>
  <text x="995" y="216" text-anchor="middle" fill="#475569" font-size="10">标准化工具接入</text>
  <text x="995" y="230" text-anchor="middle" fill="#475569" font-size="10">扩展上下文源</text>

  <!-- ===== 智能路由层 ===== -->
  <line x1="575" y1="260" x2="575" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="290" width="1050" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="315" fill="#475569" font-size="12" font-weight="bold">智能路由层 (按任务类型分流)</text>

  <!-- 补全路由 -->
  <rect x="80" y="325" width="180" height="45" rx="6" fill="#1e293b"/>
  <text x="170" y="344" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">代码补全</text>
  <text x="170" y="360" text-anchor="middle" fill="#ffffff" font-size="10">DeepSeek-Coder / StarCoder2</text>

  <rect x="290" y="325" width="180" height="45" rx="6" fill="#1e293b"/>
  <text x="380" y="344" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">代码生成</text>
  <text x="380" y="360" text-anchor="middle" fill="#ffffff" font-size="10">Claude Sonnet / GPT-4o</text>

  <rect x="500" y="325" width="180" height="45" rx="6" fill="#1e293b"/>
  <text x="590" y="344" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">代码解释</text>
  <text x="590" y="360" text-anchor="middle" fill="#ffffff" font-size="10">中等模型即可</text>

  <rect x="710" y="325" width="180" height="45" rx="6" fill="#1e293b"/>
  <text x="800" y="344" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">代码审查</text>
  <text x="800" y="360" text-anchor="middle" fill="#ffffff" font-size="10">多 Agent 协作</text>

  <!-- 延迟标注 -->
  <rect x="920" y="325" width="150" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="995" y="344" text-anchor="middle" fill="#475569" font-size="10">补全 &lt;500ms</text>
  <text x="995" y="360" text-anchor="middle" fill="#475569" font-size="10">生成 &lt;10s 流式</text>

  <!-- ===== 执行与验证层 ===== -->
  <line x1="575" y1="380" x2="575" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="410" width="1050" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="435" fill="#475569" font-size="12" font-weight="bold">执行与验证层 (闭环执行 Agentic Coding)</text>

  <!-- 闭环流程 -->
  <rect x="80" y="450" width="150" height="50" rx="6" fill="#1e293b"/>
  <text x="155" y="471" text-anchor="middle" fill="#ffffff" font-size="12">读取代码状态</text>
  <text x="155" y="487" text-anchor="middle" fill="#ffffff" font-size="10">理解现有代码</text>

  <line x1="230" y1="475" x2="260" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="450" width="150" height="50" rx="6" fill="#1e293b"/>
  <text x="335" y="471" text-anchor="middle" fill="#ffffff" font-size="12">规划变更序列</text>
  <text x="335" y="487" text-anchor="middle" fill="#ffffff" font-size="10">分解修改步骤</text>

  <line x1="410" y1="475" x2="440" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="440" y="450" width="150" height="50" rx="6" fill="#1e293b"/>
  <text x="515" y="471" text-anchor="middle" fill="#ffffff" font-size="12">执行变更</text>
  <text x="515" y="487" text-anchor="middle" fill="#ffffff" font-size="10">代码生成/修改</text>

  <line x1="590" y1="475" x2="620" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="445" width="200" height="60" rx="6" fill="#1e293b"/>
  <text x="720" y="466" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">多重验证</text>
  <text x="720" y="482" text-anchor="middle" fill="#ffffff" font-size="10">Linter + 类型检查 + 单测</text>
  <text x="720" y="496" text-anchor="middle" fill="#ffffff" font-size="10">Preview Environment</text>

  <!-- 纠错循环 -->
  <path d="M 720 505 L 720 520 Q 720 525 715 525 L 520 525 Q 515 525 515 520 L 515 500" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="618" y="522" text-anchor="middle" fill="#475569" font-size="10">验证失败 -> 修复重试</text>

  <!-- 代码审查多Agent -->
  <rect x="860" y="445" width="210" height="80" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="965" y="463" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">PR 审查 (多Agent)</text>
  <rect x="875" y="472" width="75" height="20" rx="3" fill="#1e293b"/>
  <text x="912" y="486" text-anchor="middle" fill="#ffffff" font-size="9">Bug 检测</text>
  <rect x="960" y="472" width="75" height="20" rx="3" fill="#1e293b"/>
  <text x="997" y="486" text-anchor="middle" fill="#ffffff" font-size="9">安全扫描</text>
  <rect x="875" y="498" width="75" height="20" rx="3" fill="#1e293b"/>
  <text x="912" y="512" text-anchor="middle" fill="#ffffff" font-size="9">风格检查</text>
  <rect x="960" y="498" width="75" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="997" y="512" text-anchor="middle" fill="#475569" font-size="9">SAST 扫描</text>

  <!-- ===== 反馈学习层 ===== -->
  <line x1="575" y1="540" x2="575" y2="570" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="570" width="750" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="592" fill="#475569" font-size="12" font-weight="bold">反馈学习层</text>

  <rect x="230" y="602" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="305" y="622" text-anchor="middle" fill="#ffffff" font-size="11">用户采纳率跟踪</text>

  <rect x="410" y="602" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="485" y="622" text-anchor="middle" fill="#ffffff" font-size="11">编辑距离分析</text>

  <rect x="590" y="602" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="665" y="622" text-anchor="middle" fill="#ffffff" font-size="11">偏好学习</text>

  <rect x="770" y="602" width="150" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="845" y="622" text-anchor="middle" fill="#475569" font-size="11">代码隐私保护</text>

  <!-- 底部指标 -->
  <rect x="100" y="660" width="950" height="70" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="130" y="682" fill="#1e293b" font-size="12" font-weight="bold">关键指标:</text>
  <text x="230" y="682" fill="#475569" font-size="11">补全采纳率 >30%</text>
  <text x="400" y="682" fill="#475569" font-size="11">生成 pass@1 >70%</text>
  <text x="570" y="682" fill="#475569" font-size="11">补全延迟 &lt;500ms (P95)</text>
  <text x="790" y="682" fill="#475569" font-size="11">审查覆盖 >80% 真实Bug</text>
  <text x="130" y="702" fill="#475569" font-size="11">核心差异: 上下文工程(最重要) + 智能路由(快模型补全/强模型生成) + 闭环执行(生成-验证-修复)</text>
  <text x="130" y="718" fill="#475569" font-size="11">企业隐私: 本地部署模型 / 私有化API + 代码片段脱敏 | 推测解码(Speculative Decoding)加速补全</text>
</svg>