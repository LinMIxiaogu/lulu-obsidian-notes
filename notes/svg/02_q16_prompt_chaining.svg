<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="900" height="480" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Prompt Chaining 四种设计模式</text>

  <!-- Pattern 1: Sequential -->
  <g transform="translate(20,55)">
    <rect width="420" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="420" height="26" rx="8" fill="#1e293b"/>
    <text x="210" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">模式一: 顺序链 (Sequential)</text>
    <rect x="15" y="38" width="75" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="52" y="57" text-anchor="middle" font-size="10" fill="#1e293b">输入</text>
    <line x1="93" y1="52" x2="108" y2="52" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr6)"/>
    <rect x="112" y="38" width="75" height="28" rx="5" fill="#1e293b"/>
    <text x="149" y="57" text-anchor="middle" font-size="10" fill="#ffffff">Prompt A</text>
    <line x1="190" y1="52" x2="205" y2="52" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr6)"/>
    <rect x="209" y="38" width="75" height="28" rx="5" fill="#1e293b"/>
    <text x="246" y="57" text-anchor="middle" font-size="10" fill="#ffffff">Prompt B</text>
    <line x1="287" y1="52" x2="302" y2="52" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr6)"/>
    <rect x="306" y="38" width="95" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="353" y="57" text-anchor="middle" font-size="10" fill="#1e293b">最终结果</text>
    <text x="210" y="82" text-anchor="middle" font-size="10" fill="#475569">前一步输出作为后一步输入, 如: 提取信息 -> 推理 -> 格式化</text>
  </g>

  <!-- Pattern 2: Conditional -->
  <g transform="translate(460,55)">
    <rect width="420" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="420" height="26" rx="8" fill="#1e293b"/>
    <text x="210" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">模式二: 条件链 (Conditional)</text>
    <rect x="15" y="38" width="65" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="47" y="57" text-anchor="middle" font-size="10" fill="#1e293b">输入</text>
    <line x1="83" y1="52" x2="98" y2="52" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr6)"/>
    <rect x="102" y="38" width="75" height="28" rx="5" fill="#1e293b"/>
    <text x="139" y="57" text-anchor="middle" font-size="10" fill="#ffffff">分类路由</text>
    <!-- Branch A -->
    <line x1="180" y1="46" x2="230" y2="38" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="234" y="28" width="85" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="276" y="44" text-anchor="middle" font-size="9" fill="#1e293b">类别A->PA</text>
    <!-- Branch B -->
    <line x1="180" y1="58" x2="230" y2="66" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="234" y="55" width="85" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="276" y="71" text-anchor="middle" font-size="9" fill="#1e293b">类别B->PB</text>
    <text x="210" y="87" text-anchor="middle" font-size="10" fill="#475569">先判断意图, 再路由到不同处理链</text>
  </g>

  <!-- Pattern 3: Parallel -->
  <g transform="translate(20,165)">
    <rect width="420" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="420" height="26" rx="8" fill="#1e293b"/>
    <text x="210" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">模式三: 并行链 (Parallel)</text>
    <rect x="15" y="40" width="60" height="50" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="45" y="70" text-anchor="middle" font-size="10" fill="#1e293b">输入</text>
    <!-- Fan out -->
    <line x1="78" y1="55" x2="112" y2="42" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <line x1="78" y1="65" x2="112" y2="65" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <line x1="78" y1="75" x2="112" y2="88" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="116" y="32" width="75" height="22" rx="4" fill="#1e293b"/>
    <text x="153" y="48" text-anchor="middle" font-size="10" fill="#ffffff">Prompt A</text>
    <rect x="116" y="57" width="75" height="22" rx="4" fill="#1e293b"/>
    <text x="153" y="73" text-anchor="middle" font-size="10" fill="#ffffff">Prompt B</text>
    <rect x="116" y="82" width="75" height="22" rx="4" fill="#1e293b"/>
    <text x="153" y="98" text-anchor="middle" font-size="10" fill="#ffffff">Prompt C</text>
    <!-- Fan in -->
    <line x1="194" y1="43" x2="240" y2="58" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <line x1="194" y1="68" x2="240" y2="68" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <line x1="194" y1="93" x2="240" y2="78" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="244" y="55" width="85" height="28" rx="5" fill="#1e293b"/>
    <text x="286" y="74" text-anchor="middle" font-size="10" fill="#ffffff">合并 Prompt</text>
    <line x1="332" y1="69" x2="347" y2="69" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="351" y="55" width="55" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="378" y="74" text-anchor="middle" font-size="10" fill="#1e293b">结果</text>
    <text x="210" y="115" text-anchor="middle" font-size="10" fill="#475569">多角度并行分析, 最后综合结论</text>
  </g>

  <!-- Pattern 4: Loop -->
  <g transform="translate(460,165)">
    <rect width="420" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="420" height="26" rx="8" fill="#1e293b"/>
    <text x="210" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">模式四: 循环链 (Loop)</text>
    <rect x="15" y="45" width="65" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="47" y="64" text-anchor="middle" font-size="10" fill="#1e293b">输入</text>
    <line x1="83" y1="59" x2="98" y2="59" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="102" y="45" width="70" height="28" rx="5" fill="#1e293b"/>
    <text x="137" y="64" text-anchor="middle" font-size="10" fill="#ffffff">生成</text>
    <line x1="175" y1="59" x2="190" y2="59" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <rect x="194" y="45" width="70" height="28" rx="5" fill="#1e293b"/>
    <text x="229" y="64" text-anchor="middle" font-size="10" fill="#ffffff">评估</text>
    <!-- Pass -->
    <line x1="267" y1="52" x2="310" y2="42" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr6)"/>
    <text x="290" y="38" font-size="9" fill="#475569">通过</text>
    <rect x="314" y="32" width="85" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="356" y="47" text-anchor="middle" font-size="10" fill="#1e293b">输出</text>
    <!-- Fail loop back -->
    <text x="290" y="82" font-size="9" fill="#475569">不通过</text>
    <path d="M 267 68 Q 290 90 194 90 Q 120 90 120 73" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#arr6)"/>
    <text x="210" y="115" text-anchor="middle" font-size="10" fill="#475569">生成->审查->修复->再审查, 如代码审查循环</text>
  </g>

  <!-- Engineering practices -->
  <g transform="translate(20,305)">
    <rect width="860" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="430" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">工程实践要点</text>

    <g transform="translate(20,40)">
      <rect width="190" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">可靠性</text>
      <text x="10" y="40" font-size="10" fill="#475569">每步设超时和重试</text>
      <text x="10" y="56" font-size="10" fill="#475569">中间结果持久化</text>
      <text x="10" y="72" font-size="10" fill="#475569">支持断点续传</text>
      <text x="10" y="88" font-size="10" fill="#475569">错误隔离不扩散</text>
    </g>

    <g transform="translate(230,40)">
      <rect width="190" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">可观测性</text>
      <text x="10" y="40" font-size="10" fill="#475569">监控每步延迟和成本</text>
      <text x="10" y="56" font-size="10" fill="#475569">记录中间输入输出</text>
      <text x="10" y="72" font-size="10" fill="#475569">追踪 token 消耗</text>
      <text x="10" y="88" font-size="10" fill="#475569">可视化执行链路</text>
    </g>

    <g transform="translate(440,40)">
      <rect width="190" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">vs ReAct</text>
      <text x="10" y="40" font-size="10" fill="#475569">Chaining: 预定义流程</text>
      <text x="10" y="56" font-size="10" fill="#475569">ReAct: 动态决策</text>
      <text x="10" y="72" font-size="10" fill="#475569">Chaining 更可控</text>
      <text x="10" y="88" font-size="10" fill="#475569">ReAct 更灵活</text>
    </g>

    <g transform="translate(650,40)">
      <rect width="190" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">工具框架</text>
      <text x="10" y="40" font-size="10" fill="#475569">LangChain LCEL</text>
      <text x="10" y="56" font-size="10" fill="#475569">LlamaIndex Pipeline</text>
      <text x="10" y="72" font-size="10" fill="#475569">LangGraph (状态图)</text>
      <text x="10" y="88" font-size="10" fill="#475569">自定义 DAG 编排</text>
    </g>
  </g>

  <defs>
    <marker id="arr6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>