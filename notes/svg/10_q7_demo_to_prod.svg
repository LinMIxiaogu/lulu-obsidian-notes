<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="680" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="300" y="15" width="500" height="40" rx="8" fill="#1e293b"/>
  <text x="550" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Demo Agent -> 生产系统 七步演进路线</text>

  <!-- ===== 时间轴主干 ===== -->
  <line x1="100" y1="85" x2="1020" y2="85" stroke="#94a3b8" stroke-width="2"/>

  <!-- 时间标注 -->
  <text x="180" y="78" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">第一周</text>
  <text x="440" y="78" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">第二周</text>
  <text x="620" y="78" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">第三周</text>
  <text x="790" y="78" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">第四周</text>
  <text x="960" y="78" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">持续</text>

  <!-- 时间轴节点 -->
  <circle cx="120" cy="85" r="5" fill="#1e293b"/>
  <circle cx="250" cy="85" r="5" fill="#1e293b"/>
  <circle cx="440" cy="85" r="5" fill="#1e293b"/>
  <circle cx="620" cy="85" r="5" fill="#1e293b"/>
  <circle cx="790" cy="85" r="5" fill="#1e293b"/>
  <circle cx="960" cy="85" r="5" fill="#1e293b"/>

  <!-- ===== Step 1: 鲁棒性加固 ===== -->
  <line x1="120" y1="90" x2="120" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="30" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="30" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="130" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 1: 鲁棒性加固</text>

  <text x="50" y="158" fill="#1e293b" font-size="11">输入校验 (长度/格式/恶意)</text>
  <text x="50" y="175" fill="#1e293b" font-size="11">异常处理 (超时/限流/错误)</text>
  <text x="50" y="192" fill="#1e293b" font-size="11">工具重试 + 兜底策略</text>
  <text x="50" y="209" fill="#1e293b" font-size="11">输出校验 (格式/安全/幻觉)</text>
  <text x="50" y="226" fill="#1e293b" font-size="11">超时熔断 + 最大步数</text>
  <text x="50" y="243" fill="#1e293b" font-size="11">Edge Case 库积累</text>
  <rect x="38" y="250" width="28" height="10" rx="2" fill="#1e293b"/>
  <text x="72" y="258" fill="#475569" font-size="9">最高优先级</text>

  <!-- ===== Step 2: 安全体系 ===== -->
  <line x1="250" y1="90" x2="250" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="240" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="240" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="340" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 2: 安全体系</text>

  <text x="260" y="158" fill="#1e293b" font-size="11">Prompt Injection 防御</text>
  <text x="260" y="175" fill="#1e293b" font-size="11">工具执行沙箱化</text>
  <text x="260" y="192" fill="#1e293b" font-size="11">权限控制 (RBAC/ABAC)</text>
  <text x="260" y="209" fill="#1e293b" font-size="11">PII 脱敏 + 内容过滤</text>
  <text x="260" y="226" fill="#1e293b" font-size="11">数据加密 (传输+存储)</text>
  <text x="260" y="243" fill="#1e293b" font-size="11">审计日志 (全操作追溯)</text>
  <rect x="248" y="250" width="28" height="10" rx="2" fill="#1e293b"/>
  <text x="282" y="258" fill="#475569" font-size="9">最高优先级</text>

  <!-- ===== Step 3: 可观测性 ===== -->
  <line x1="440" y1="90" x2="440" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="350" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="350" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="450" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 3: 可观测性</text>

  <text x="370" y="158" fill="#1e293b" font-size="11">结构化日志 (全轨迹)</text>
  <text x="370" y="175" fill="#1e293b" font-size="11">链路追踪 (OTel)</text>
  <text x="370" y="192" fill="#1e293b" font-size="11">核心指标监控</text>
  <text x="375" y="206" fill="#475569" font-size="9">成功率 / P95延迟 / Token</text>
  <text x="370" y="223" fill="#1e293b" font-size="11">自动告警</text>
  <text x="375" y="237" fill="#475569" font-size="9">成功率&lt;85% / P99>30s</text>
  <text x="370" y="253" fill="#1e293b" font-size="11">LangSmith + Prometheus</text>

  <!-- ===== Step 4: 成本优化 ===== -->
  <line x1="620" y1="90" x2="620" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="530" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="530" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="630" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 4: 成本优化</text>

  <text x="550" y="158" fill="#1e293b" font-size="11">智能路由 (大小模型分流)</text>
  <text x="555" y="172" fill="#475569" font-size="9">成本降低 72%</text>
  <text x="550" y="189" fill="#1e293b" font-size="11">语义缓存 (相似问题复用)</text>
  <text x="555" y="203" fill="#475569" font-size="9">成本降低 90%</text>
  <text x="550" y="220" fill="#1e293b" font-size="11">Prompt 精简 + 上下文裁剪</text>
  <text x="550" y="237" fill="#1e293b" font-size="11">批量处理 + 成本预算</text>
  <text x="550" y="253" fill="#1e293b" font-size="11">Token 用量/配额管理</text>

  <!-- ===== Step 5: 评估体系 ===== -->
  <line x1="790" y1="90" x2="790" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="700" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="700" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="800" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 5: 评估体系</text>

  <text x="720" y="158" fill="#1e293b" font-size="11">评测数据集</text>
  <text x="725" y="172" fill="#475569" font-size="9">基础集+BadCase集+边界集</text>
  <text x="720" y="189" fill="#1e293b" font-size="11">自动化评测 Pipeline</text>
  <text x="725" y="203" fill="#475569" font-size="9">每次变更触发 + 质量门禁</text>
  <text x="720" y="220" fill="#1e293b" font-size="11">评估方法组合</text>
  <text x="725" y="234" fill="#475569" font-size="9">规则+LLM-Judge+人工</text>
  <text x="720" y="253" fill="#1e293b" font-size="11">A/B 测试框架</text>

  <!-- ===== Step 6+7: 高可用+持续迭代 ===== -->
  <line x1="960" y1="90" x2="960" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="870" y="110" width="200" height="155" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="870" y="110" width="200" height="30" rx="8" fill="#1e293b"/>
  <text x="970" y="130" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Step 6-7: 高可用+迭代</text>

  <text x="890" y="155" fill="#1e293b" font-size="11" font-weight="bold">高可用:</text>
  <text x="890" y="170" fill="#1e293b" font-size="11">无状态 + 多实例 + 限流</text>
  <text x="890" y="185" fill="#1e293b" font-size="11">故障切换 + HPA 弹性伸缩</text>

  <text x="890" y="208" fill="#1e293b" font-size="11" font-weight="bold">持续迭代:</text>
  <text x="890" y="223" fill="#1e293b" font-size="11">用户反馈闭环</text>
  <text x="890" y="238" fill="#1e293b" font-size="11">Bad Case 驱动优化</text>
  <text x="890" y="253" fill="#1e293b" font-size="11">灰度发布 + 数据飞轮</text>

  <!-- ===== Demo vs 生产对比 ===== -->
  <rect x="50" y="290" width="1000" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="312" fill="#1e293b" font-size="14" font-weight="bold">Demo vs 生产系统 关键差距</text>

  <!-- 表头 -->
  <rect x="80" y="322" width="120" height="25" rx="4" fill="#1e293b"/>
  <text x="140" y="340" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">维度</text>
  <rect x="210" y="322" width="350" height="25" rx="4" fill="#1e293b"/>
  <text x="385" y="340" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Demo</text>
  <rect x="570" y="322" width="450" height="25" rx="4" fill="#1e293b"/>
  <text x="795" y="340" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">生产系统</text>

  <!-- 行1 -->
  <text x="140" y="368" text-anchor="middle" fill="#1e293b" font-size="11">输入</text>
  <text x="385" y="368" text-anchor="middle" fill="#475569" font-size="11">预设测试 Case</text>
  <text x="795" y="368" text-anchor="middle" fill="#475569" font-size="11">千奇百怪的真实用户输入</text>

  <!-- 行2 -->
  <text x="140" y="388" text-anchor="middle" fill="#1e293b" font-size="11">规模</text>
  <text x="385" y="388" text-anchor="middle" fill="#475569" font-size="11">单用户测试</text>
  <text x="795" y="388" text-anchor="middle" fill="#475569" font-size="11">千人并发 + 99.9% 可用性</text>

  <!-- 行3 -->
  <text x="140" y="408" text-anchor="middle" fill="#1e293b" font-size="11">安全</text>
  <text x="385" y="408" text-anchor="middle" fill="#475569" font-size="11">无防护</text>
  <text x="795" y="408" text-anchor="middle" fill="#475569" font-size="11">多层安全体系 (Injection防御+沙箱+权限+脱敏)</text>

  <!-- 行4 -->
  <text x="140" y="428" text-anchor="middle" fill="#1e293b" font-size="11">成本</text>
  <text x="385" y="428" text-anchor="middle" fill="#475569" font-size="11">不计成本 (GPT-4处理所有)</text>
  <text x="795" y="428" text-anchor="middle" fill="#475569" font-size="11">智能路由 + 缓存 + 预算管控</text>

  <!-- 行5 -->
  <text x="140" y="448" text-anchor="middle" fill="#1e293b" font-size="11">监控</text>
  <text x="385" y="448" text-anchor="middle" fill="#475569" font-size="11">print 日志</text>
  <text x="795" y="448" text-anchor="middle" fill="#475569" font-size="11">Metrics + Logs + Traces 全链路可观测</text>

  <!-- ===== 常见陷阱 ===== -->
  <rect x="50" y="480" width="1000" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="502" fill="#1e293b" font-size="14" font-weight="bold">常见陷阱 (面试加分点)</text>

  <rect x="80" y="515" width="220" height="35" rx="6" fill="#1e293b"/>
  <text x="190" y="530" text-anchor="middle" fill="#ffffff" font-size="12">过早优化</text>
  <text x="190" y="544" text-anchor="middle" fill="#ffffff" font-size="9">没有监控就盲目优化成本</text>

  <rect x="320" y="515" width="220" height="35" rx="6" fill="#1e293b"/>
  <text x="430" y="530" text-anchor="middle" fill="#ffffff" font-size="12">忽视安全</text>
  <text x="430" y="544" text-anchor="middle" fill="#ffffff" font-size="9">先上线再补安全 = 灾难</text>

  <rect x="560" y="515" width="220" height="35" rx="6" fill="#1e293b"/>
  <text x="670" y="530" text-anchor="middle" fill="#ffffff" font-size="12">评估缺失</text>
  <text x="670" y="544" text-anchor="middle" fill="#ffffff" font-size="9">无指标就迭代 = 盲人摸象</text>

  <rect x="800" y="515" width="220" height="35" rx="6" fill="#1e293b"/>
  <text x="910" y="530" text-anchor="middle" fill="#ffffff" font-size="12">过度工程</text>
  <text x="910" y="544" text-anchor="middle" fill="#ffffff" font-size="9">初期单Agent+好Prompt就够</text>

  <!-- 底部总结 -->
  <rect x="100" y="580" width="900" height="80" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="550" y="604" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">七步法总结: 鲁棒性 -> 安全 -> 可观测 -> 成本 -> 评估 -> 高可用 -> 持续迭代</text>
  <text x="550" y="626" text-anchor="middle" fill="#475569" font-size="12">核心原则: 第一周先搞鲁棒性和安全 (最高优先级)</text>
  <text x="550" y="646" text-anchor="middle" fill="#475569" font-size="12">面试要点: 展示从"能跑"到"能用"到"好用"的工程成熟度和系统性思维</text>
</svg>