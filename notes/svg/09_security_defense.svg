  <rect x="930" y="80" width="150" height="460" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1005" y="105" text-anchor="middle" fill="#475569" font-size="14" font-weight="bold">防御框架</text>
