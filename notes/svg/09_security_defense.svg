  <line x1="550" y1="365" x2="550" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: 输出层 -->
  <rect x="195" y="380" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="385" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="415" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">⑤ 输出层</text>
  <text x="380" y="403" fill="#1e293b" font-size="13">PII 过滤 · 有害内容检测 · 事实校验</text>
  <text x="380" y="425" fill="#475569" font-size="11">正则+NER脱敏 · 内容安全分类 · RAG Grounding验证 · 话题边界控制</text>

  <line x1="550" y1="440" x2="550" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 6: 运维层 -->
  <rect x="195" y="455" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="460" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="490" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">⑥ 运维层</text>
  <text x="380" y="478" fill="#1e293b" font-size="13">审计日志 · Red Teaming · 监控告警</text>
  <text x="380" y="500" fill="#475569" font-size="11">全链路日志 · 自动化红队测试 · 异常行为检测 · 安全事件响应 · A/B安全回归</text>

  <!-- 左侧攻击箭头 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="attackArrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 攻击箭头连线 -->
  <line x1="170" y1="150" x2="195" y2="110" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="215" x2="195" y2="185" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="290" x2="195" y2="260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="370" x2="195" y2="335" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="430" x2="195" y2="410" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="170" y1="475" x2="195" y2="485" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 右侧框架连线 -->
  <line x1="930" y1="160" x2="905" y2="110" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="270" x2="905" y2="260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="360" x2="905" y2="335" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="450" x2="905" y2="410" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="520" x2="905" y2="485" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 底部标注 -->
  <rect x="195" y="535" width="710" height="95" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="558" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">OWASP LLM Top 10 (2025) 关键风险</text>
  <text x="220" y="580" fill="#475569" font-size="11">LLM01: Prompt Injection</text>
  <text x="420" y="580" fill="#475569" font-size="11">LLM02: 敏感信息泄露</text>
  <text x="620" y="580" fill="#475569" font-size="11">LLM03: 供应链漏洞</text>
  <text x="220" y="600" fill="#475569" font-size="11">LLM04: 数据与模型投毒</text>
  <text x="420" y="600" fill="#475569" font-size="11">LLM05: 不当输出处理</text>
  <text x="620" y="600" fill="#475569" font-size="11">LLM06: 过度自主权</text>
  <text x="220" y="620" fill="#475569" font-size="11">LLM07: 系统Prompt泄露</text>
  <text x="420" y="620" fill="#475569" font-size="11">LLM08: 向量/Embedding投毒</text>
  <text x="620" y="620" fill="#475569" font-size="11">LLM09: 错误信息生成</text>
  <text x="820" y="600" fill="#475569" font-size="11">LLM10: 无界消耗</text>
</svg>