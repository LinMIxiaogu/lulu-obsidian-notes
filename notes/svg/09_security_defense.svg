  <!-- Layer 3: 模型层 -->
  <rect x="195" y="230" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="235" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="265" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">③ 模型层</text>
  <text x="380" y="253" fill="#1e293b" font-size="13">安全对齐 · 输出约束</text>
  <text x="380" y="275" fill="#475569" font-size="11">RLHF/RLAIF安全训练 · Constitutional AI · 安全微调 · 温度控制</text>

  <line x1="550" y1="290" x2="550" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: 工具层 -->
  <rect x="195" y="305" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="310" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="340" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">④ 工具层</text>
