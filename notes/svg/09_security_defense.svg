  <text x="1005" y="165" text-anchor="middle" fill="#475569" font-size="11">话题控制 / PII检测</text>
  <text x="1005" y="182" text-anchor="middle" fill="#475569" font-size="11">Jailbreak防御</text>
  <text x="1005" y="199" text-anchor="middle" fill="#475569" font-size="11">Colang规则引擎</text>
  <rect x="950" y="215" width="110" height="1" fill="#e2e8f0"/>
  <text x="1005" y="240" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold">Guardrails AI</text>
  <text x="1005" y="260" text-anchor="middle" fill="#475569" font-size="11">输出结构验证</text>
  <text x="1005" y="277" text-anchor="middle" fill="#475569" font-size="11">Validator Hub</text>
  <text x="1005" y="294" text-anchor="middle" fill="#475569" font-size="11">Pydantic集成</text>
  <rect x="950" y="310" width="110" height="1" fill="#e2e8f0"/>
  <text x="1005" y="335" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold">Lakera Guard</text>
  <text x="1005" y="355" text-anchor="middle" fill="#475569" font-size="11">Injection实时检测</text>
  <text x="1005" y="372" text-anchor="middle" fill="#475569" font-size="11">内容安全分类</text>
  <text x="1005" y="389" text-anchor="middle" fill="#475569" font-size="11">API即插即用</text>
  <rect x="950" y="405" width="110" height="1" fill="#e2e8f0"/>
  <text x="1005" y="430" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold">LLM Guard</text>
  <text x="1005" y="450" text-anchor="middle" fill="#475569" font-size="11">输入/输出扫描</text>
  <text x="1005" y="467" text-anchor="middle" fill="#475569" font-size="11">匿名化处理</text>
  <rect x="950" y="483" width="110" height="1" fill="#e2e8f0"/>
  <text x="1005" y="508" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold">OpenAI Moderation</text>
  <text x="1005" y="528" text-anchor="middle" fill="#475569" font-size="11">内容安全分类API</text>

  <!-- 六层防护 - 中间区域 -->
  <!-- Layer 1: 输入层 -->
  <rect x="195" y="80" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="85" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="115" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">① 输入层</text>
  <text x="380" y="103" fill="#1e293b" font-size="13">Prompt Injection 检测</text>
  <text x="380" y="125" fill="#475569" font-size="11">规则匹配 · 分类器模型 · Perplexity异常检测 · 输入长度/频率限制</text>

  <!-- 连接线 -->
  <line x1="550" y1="140" x2="550" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: 指令层 -->
  <rect x="195" y="155" width="710" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="205" y="160" width="120" height="50" rx="4" fill="#1e293b"/>
  <text x="265" y="190" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">② 指令层</text>
  <text x="380" y="178" fill="#1e293b" font-size="13">System Prompt 隔离 · 角色锁定</text>
