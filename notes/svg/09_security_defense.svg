<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>

  <!-- 背景 -->
  <rect width="1100" height="650" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="350" y="18" width="400" height="40" rx="8" fill="#1e293b"/>
  <text x="550" y="44" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Agent 安全防护六层体系</text>

  <!-- 左侧攻击类型标注区 -->
  <rect x="20" y="80" width="150" height="460" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="95" y="105" text-anchor="middle" fill="#475569" font-size="14" font-weight="bold">攻击类型</text>
  <line x1="40" y1="115" x2="150" y2="115" stroke="#e2e8f0"/>
  <text x="95" y="145" text-anchor="middle" fill="#475569" font-size="12">直接 Prompt</text>
  <text x="95" y="162" text-anchor="middle" fill="#475569" font-size="12">Injection</text>
  <rect x="40" y="180" width="110" height="1" fill="#e2e8f0"/>
  <text x="95" y="200" text-anchor="middle" fill="#475569" font-size="12">间接 Prompt</text>
  <text x="95" y="217" text-anchor="middle" fill="#475569" font-size="12">Injection</text>
  <text x="95" y="234" text-anchor="middle" fill="#475569" font-size="11">(数据/工具注入)</text>
  <rect x="40" y="250" width="110" height="1" fill="#e2e8f0"/>
  <text x="95" y="275" text-anchor="middle" fill="#475569" font-size="12">Jailbreak</text>
  <text x="95" y="292" text-anchor="middle" fill="#475569" font-size="11">(角色扮演/多语言</text>
  <text x="95" y="309" text-anchor="middle" fill="#475569" font-size="11">编码绕过)</text>
  <rect x="40" y="325" width="110" height="1" fill="#e2e8f0"/>
  <text x="95" y="350" text-anchor="middle" fill="#475569" font-size="12">工具滥用</text>
  <text x="95" y="367" text-anchor="middle" fill="#475569" font-size="11">(参数篡改/越权)</text>
  <rect x="40" y="383" width="110" height="1" fill="#e2e8f0"/>
  <text x="95" y="408" text-anchor="middle" fill="#475569" font-size="12">数据泄露</text>
  <text x="95" y="425" text-anchor="middle" fill="#475569" font-size="11">(PII/System Prompt)</text>
  <rect x="40" y="441" width="110" height="1" fill="#e2e8f0"/>
  <text x="95" y="466" text-anchor="middle" fill="#475569" font-size="12">记忆投毒</text>
  <text x="95" y="483" text-anchor="middle" fill="#475569" font-size="11">(持久化攻击)</text>

