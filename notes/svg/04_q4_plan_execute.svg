<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="560" height="300" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <text x="280" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Plan-and-Execute 架构</text>

  <!-- 用户目标 -->
  <rect x="210" y="45" width="140" height="34" rx="8" fill="#1e293b"/>
  <text x="280" y="67" text-anchor="middle" font-size="13" fill="#ffffff">用户目标</text>

  <line x1="280" y1="79" x2="280" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Planner -->
  <rect x="180" y="98" width="200" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="280" y="119" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">Planner（规划器）</text>
  <text x="280" y="137" text-anchor="middle" font-size="11" fill="#475569">生成分步计划、选择工具、设优先级</text>

  <!-- 计划输出 -->
  <line x1="280" y1="148" x2="280" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 步骤列表 -->
  <rect x="130" y="168" width="300" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="280" y="191" text-anchor="middle" font-size="11" fill="#475569">计划: Step1 → Step2 → Step3 → ... → StepN</text>

  <line x1="280" y1="204" x2="280" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Executor -->
  <rect x="180" y="223" width="200" height="50" rx="8" fill="#1e293b"/>
  <text x="280" y="244" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold">Executor（执行器）</text>
  <text x="280" y="262" text-anchor="middle" font-size="11" fill="#e2e8f0">逐步执行、调用工具、验证结果</text>

  <!-- Replanner 反馈循环 -->
  <line x1="380" y1="248" x2="470" y2="248" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="470" y1="248" x2="470" y2="123" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="470" y1="123" x2="385" y2="123" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Replanner 标签 -->
  <rect x="440" y="158" width="105" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="492" y="179" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="bold">Replanner</text>
  <text x="492" y="197" text-anchor="middle" font-size="10" fill="#475569">根据反馈调整计划</text>

  <!-- 左侧对比标注 -->
  <rect x="15" y="98" width="110" height="46" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="70" y="117" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">vs ReAct</text>
  <text x="70" y="134" text-anchor="middle" font-size="10" fill="#475569">"边想边做"</text>

  <rect x="15" y="154" width="110" height="46" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="70" y="173" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">Plan-Execute</text>
  <text x="70" y="190" text-anchor="middle" font-size="10" fill="#475569">"先想后做"</text>

  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>