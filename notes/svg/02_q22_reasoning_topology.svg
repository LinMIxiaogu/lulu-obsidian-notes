<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="950" height="500" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="475" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">推理拓扑演进: CoT -> Self-Consistency -> ToT -> GoT</text>

  <!-- CoT -->
  <g transform="translate(20,60)">
    <rect width="210" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="210" height="28" rx="8" fill="#1e293b"/>
    <text x="105" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">CoT (链式思维)</text>
    <!-- Chain -->
    <circle cx="105" cy="60" r="14" fill="#1e293b"/><text x="105" y="65" text-anchor="middle" font-size="10" fill="#ffffff">A</text>
    <line x1="105" y1="74" x2="105" y2="90" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>
    <circle cx="105" cy="105" r="14" fill="#1e293b"/><text x="105" y="110" text-anchor="middle" font-size="10" fill="#ffffff">B</text>
    <line x1="105" y1="119" x2="105" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>
    <circle cx="105" cy="150" r="14" fill="#1e293b"/><text x="105" y="155" text-anchor="middle" font-size="10" fill="#ffffff">C</text>
    <line x1="105" y1="164" x2="105" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>
    <rect x="80" y="182" width="50" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="105" y="196" text-anchor="middle" font-size="10" fill="#1e293b">D</text>
  </g>

  <!-- Self-Consistency -->
  <g transform="translate(250,60)">
    <rect width="210" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="210" height="28" rx="8" fill="#1e293b"/>
    <text x="105" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Self-Consistency</text>
    <!-- Multiple chains -->
    <circle cx="50" cy="55" r="10" fill="#1e293b"/><text x="50" y="59" text-anchor="middle" font-size="8" fill="#ffffff">A</text>
    <circle cx="105" cy="55" r="10" fill="#1e293b"/><text x="105" y="59" text-anchor="middle" font-size="8" fill="#ffffff">A</text>
    <circle cx="160" cy="55" r="10" fill="#1e293b"/><text x="160" y="59" text-anchor="middle" font-size="8" fill="#ffffff">A</text>
    <line x1="50" y1="65" x2="50" y2="78" stroke="#94a3b8" stroke-width="1"/>
    <line x1="105" y1="65" x2="105" y2="78" stroke="#94a3b8" stroke-width="1"/>
    <line x1="160" y1="65" x2="160" y2="78" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="50" cy="90" r="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="50" y="94" text-anchor="middle" font-size="8" fill="#1e293b">B</text>
    <circle cx="105" cy="90" r="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="105" y="94" text-anchor="middle" font-size="8" fill="#1e293b">B'</text>
    <circle cx="160" cy="90" r="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="160" y="94" text-anchor="middle" font-size="8" fill="#1e293b">B''</text>
    <line x1="50" y1="100" x2="50" y2="115" stroke="#94a3b8" stroke-width="1"/>
    <line x1="105" y1="100" x2="105" y2="115" stroke="#94a3b8" stroke-width="1"/>
    <line x1="160" y1="100" x2="160" y2="115" stroke="#94a3b8" stroke-width="1"/>
    <rect x="30" y="117" width="40" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="50" y="129" text-anchor="middle" font-size="8" fill="#1e293b">D1</text>
    <rect x="85" y="117" width="40" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="105" y="129" text-anchor="middle" font-size="8" fill="#1e293b">D2</text>
    <rect x="140" y="117" width="40" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="160" y="129" text-anchor="middle" font-size="8" fill="#1e293b">D3</text>
    <!-- Vote -->
    <line x1="50" y1="133" x2="105" y2="155" stroke="#94a3b8" stroke-width="1"/>
    <line x1="105" y1="133" x2="105" y2="155" stroke="#94a3b8" stroke-width="1"/>
    <line x1="160" y1="133" x2="105" y2="155" stroke="#94a3b8" stroke-width="1"/>
    <rect x="60" y="155" width="90" height="22" rx="4" fill="#1e293b"/>
    <text x="105" y="170" text-anchor="middle" font-size="10" fill="#ffffff">多数投票</text>
    <rect x="70" y="185" width="70" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="105" y="197" text-anchor="middle" font-size="9" fill="#1e293b">D_best</text>
  </g>

  <!-- ToT -->
  <g transform="translate(480,60)">
    <rect width="210" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="210" height="28" rx="8" fill="#1e293b"/>
    <text x="105" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">ToT (思维树)</text>
    <!-- Tree -->
    <circle cx="105" cy="55" r="12" fill="#1e293b"/><text x="105" y="59" text-anchor="middle" font-size="9" fill="#ffffff">A</text>
    <line x1="93" y1="65" x2="55" y2="85" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="105" y1="67" x2="105" y2="85" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="117" y1="65" x2="155" y2="85" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="55" cy="97" r="12" fill="#1e293b"/><text x="55" y="101" text-anchor="middle" font-size="9" fill="#ffffff">B</text>
    <circle cx="105" cy="97" r="12" fill="#f1f5f9" stroke="#cbd5e1"/><text x="105" y="101" text-anchor="middle" font-size="9" fill="#1e293b">B'</text>
    <circle cx="155" cy="97" r="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="3,2"/><text x="155" y="101" text-anchor="middle" font-size="9" fill="#94a3b8">B''</text>
    <text x="175" y="97" font-size="8" fill="#94a3b8">x 剪枝</text>
    <line x1="45" y1="109" x2="35" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="65" y1="109" x2="75" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="35" cy="142" r="12" fill="#1e293b"/><text x="35" y="146" text-anchor="middle" font-size="9" fill="#ffffff">C</text>
    <circle cx="75" cy="142" r="12" fill="#f1f5f9" stroke="#cbd5e1"/><text x="75" y="146" text-anchor="middle" font-size="9" fill="#1e293b">C'</text>
    <line x1="35" y1="154" x2="35" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr4)"/>
    <rect x="10" y="180" width="50" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="35" y="192" text-anchor="middle" font-size="9" fill="#1e293b">D</text>
    <!-- Back arrow -->
    <path d="M 88 105 Q 85 120 78 130" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arr4)"/>
    <text x="100" y="125" font-size="8" fill="#94a3b8">回溯</text>
  </g>

  <!-- GoT -->
  <g transform="translate(710,60)">
    <rect width="220" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="220" height="28" rx="8" fill="#1e293b"/>
    <text x="110" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">GoT (思维图)</text>
    <!-- Graph -->
    <circle cx="110" cy="55" r="12" fill="#1e293b"/><text x="110" y="59" text-anchor="middle" font-size="9" fill="#ffffff">A</text>
    <line x1="98" y1="63" x2="55" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="122" y1="63" x2="165" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="55" cy="95" r="12" fill="#1e293b"/><text x="55" y="99" text-anchor="middle" font-size="9" fill="#ffffff">B</text>
    <circle cx="165" cy="95" r="12" fill="#1e293b"/><text x="165" y="99" text-anchor="middle" font-size="9" fill="#ffffff">C</text>
    <line x1="55" y1="107" x2="55" y2="125" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="165" y1="107" x2="165" y2="125" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="55" cy="138" r="12" fill="#f1f5f9" stroke="#cbd5e1"/><text x="55" y="142" text-anchor="middle" font-size="9" fill="#1e293b">D</text>
    <circle cx="165" cy="138" r="12" fill="#f1f5f9" stroke="#cbd5e1"/><text x="165" y="142" text-anchor="middle" font-size="9" fill="#1e293b">E</text>
    <!-- Merge -->
    <line x1="67" y1="146" x2="98" y2="168" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="153" y1="146" x2="122" y2="168" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="110" cy="180" r="14" fill="#1e293b"/><text x="110" y="184" text-anchor="middle" font-size="8" fill="#ffffff">合并</text>
    <text x="110" y="210" text-anchor="middle" font-size="9" fill="#475569">支持合并/分裂/循环</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(20,285)">
    <rect width="910" height="195" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="455" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">推理策略选型指南</text>
    <!-- Headers -->
    <text x="40" y="52" font-size="11" font-weight="bold" fill="#1e293b">策略</text>
    <text x="180" y="52" font-size="11" font-weight="bold" fill="#1e293b">拓扑</text>
    <text x="310" y="52" font-size="11" font-weight="bold" fill="#1e293b">回溯</text>
    <text x="410" y="52" font-size="11" font-weight="bold" fill="#1e293b">评估</text>
    <text x="530" y="52" font-size="11" font-weight="bold" fill="#1e293b">计算开销</text>
    <text x="660" y="52" font-size="11" font-weight="bold" fill="#1e293b">适用场景</text>
    <line x1="30" y1="58" x2="880" y2="58" stroke="#e2e8f0" stroke-width="1"/>

    <text x="40" y="78" font-size="11" fill="#475569">CoT</text>
    <text x="180" y="78" font-size="11" fill="#475569">线性链</text>
    <text x="310" y="78" font-size="11" fill="#475569">无</text>
    <text x="410" y="78" font-size="11" fill="#475569">无</text>
    <text x="530" y="78" font-size="11" fill="#475569">低 (1x)</text>
    <text x="660" y="78" font-size="11" fill="#475569">单步推理, 数学</text>

    <text x="40" y="98" font-size="11" fill="#475569">Self-Consistency</text>
    <text x="180" y="98" font-size="11" fill="#475569">多链+投票</text>
    <text x="310" y="98" font-size="11" fill="#475569">无</text>
    <text x="410" y="98" font-size="11" fill="#475569">多数投票</text>
    <text x="530" y="98" font-size="11" fill="#475569">中 (Nx)</text>
    <text x="660" y="98" font-size="11" fill="#475569">高准确率要求</text>

    <text x="40" y="118" font-size="11" fill="#475569">ToT</text>
    <text x="180" y="118" font-size="11" fill="#475569">树</text>
    <text x="310" y="118" font-size="11" fill="#475569">支持</text>
    <text x="410" y="118" font-size="11" fill="#475569">每步评估</text>
    <text x="530" y="118" font-size="11" fill="#475569">高</text>
    <text x="660" y="118" font-size="11" fill="#475569">探索+回溯规划</text>

    <text x="40" y="138" font-size="11" fill="#475569">GoT</text>
    <text x="180" y="138" font-size="11" fill="#475569">任意图</text>
    <text x="310" y="138" font-size="11" fill="#475569">支持</text>
    <text x="410" y="138" font-size="11" fill="#475569">节点评估</text>
    <text x="530" y="138" font-size="11" fill="#475569">最高</text>
    <text x="660" y="138" font-size="11" fill="#475569">合并/精炼复杂任务</text>

    <text x="40" y="158" font-size="11" fill="#475569">LATS</text>
    <text x="180" y="158" font-size="11" fill="#475569">树+状态</text>
    <text x="310" y="158" font-size="11" fill="#475569">MCTS</text>
    <text x="410" y="158" font-size="11" fill="#475569">反思传播</text>
    <text x="530" y="158" font-size="11" fill="#475569">高</text>
    <text x="660" y="158" font-size="11" fill="#475569">Agent 多步规划</text>

    <text x="40" y="183" font-size="11" fill="#475569" font-style="italic">Reflexion</text>
    <text x="180" y="183" font-size="11" fill="#475569" font-style="italic">链+反思循环</text>
    <text x="310" y="183" font-size="11" fill="#475569" font-style="italic">重试</text>
    <text x="410" y="183" font-size="11" fill="#475569" font-style="italic">语言化反思</text>
    <text x="530" y="183" font-size="11" fill="#475569" font-style="italic">中</text>
    <text x="660" y="183" font-size="11" fill="#475569" font-style="italic">Agent 自纠错</text>
  </g>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>