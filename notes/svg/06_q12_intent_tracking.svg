<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="780" height="520" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">多轮对话意图跟踪状态机</text>

  <!-- State Machine (left) -->
  <rect x="30" y="56" width="400" height="440" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">意图状态机</text>

  <!-- Active State -->
  <rect x="140" y="96" width="180" height="44" rx="8" fill="#1e293b"/>
  <text x="230" y="123" text-anchor="middle" font-size="13" fill="#ffffff">ACTIVE (活跃)</text>

  <!-- Paused State -->
  <rect x="50" y="260" width="160" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="130" y="287" text-anchor="middle" font-size="13" fill="#1e293b">PAUSED (已暂停)</text>

  <!-- Completed State -->
  <rect x="250" y="260" width="160" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="330" y="287" text-anchor="middle" font-size="13" fill="#1e293b">COMPLETED (已完成)</text>

  <!-- Archived State -->
  <rect x="150" y="400" width="160" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="230" y="427" text-anchor="middle" font-size="13" fill="#1e293b">ARCHIVED (已归档)</text>

  <!-- Transitions -->
  <!-- Active -> Paused (Switch) -->
  <path d="M 160 140 Q 80 200 120 260" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="62" y="196" font-size="10" fill="#475569">切换 (Switch)</text>
  <text x="62" y="208" font-size="9" fill="#94a3b8">话题突变</text>

  <!-- Paused -> Active (Resume) -->
  <path d="M 170 260 Q 200 200 210 140" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="200" y="196" font-size="10" fill="#475569">恢复 (Resume)</text>
  <text x="200" y="208" font-size="9" fill="#94a3b8">"刚才那个..."</text>

  <!-- Active -> Active (Continuation) -->
  <path d="M 320 108 Q 370 80 370 118 Q 370 140 320 130" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="354" y="96" font-size="10" fill="#475569">延续</text>

  <!-- Active -> Completed -->
  <path d="M 300 140 Q 360 200 340 260" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="196" font-size="10" fill="#475569">任务完成</text>

  <!-- Paused -> Archived (timeout) -->
  <path d="M 130 304 Q 130 360 190 400" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="358" font-size="10" fill="#475569">超时</text>

  <!-- Completed -> Archived -->
  <path d="M 330 304 Q 330 360 270 400" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="358" font-size="10" fill="#475569">归档</text>

  <!-- Intent Stack (right) -->
  <rect x="460" y="56" width="290" height="440" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="605" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">Intent Stack (意图栈)</text>

  <!-- Stack Top -->
  <rect x="480" y="96" width="250" height="80" rx="6" fill="#1e293b"/>
  <text x="605" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">TOP - 当前活跃意图</text>
  <text x="605" y="134" text-anchor="middle" font-size="11" fill="#94a3b8">intent: "订机票"</text>
  <text x="605" y="150" text-anchor="middle" font-size="11" fill="#94a3b8">slots: {出发:北京, 目的:上海, 日期:?}</text>
  <text x="605" y="166" text-anchor="middle" font-size="11" fill="#94a3b8">status: ACTIVE</text>

  <!-- Stack Middle -->
  <rect x="480" y="186" width="250" height="72" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="605" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">已暂停意图</text>
  <text x="605" y="224" text-anchor="middle" font-size="11" fill="#475569">intent: "订酒店"</text>
  <text x="605" y="240" text-anchor="middle" font-size="11" fill="#475569">slots: {城市:上海, 预算:?}</text>
  <text x="605" y="252" text-anchor="middle" font-size="10" fill="#94a3b8">status: PAUSED</text>

  <!-- Stack Bottom -->
  <rect x="480" y="268" width="250" height="72" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="605" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">已完成意图</text>
  <text x="605" y="306" text-anchor="middle" font-size="11" fill="#475569">intent: "查天气"</text>
  <text x="605" y="322" text-anchor="middle" font-size="11" fill="#475569">slots: {城市:北京}</text>
  <text x="605" y="334" text-anchor="middle" font-size="10" fill="#94a3b8">status: COMPLETED</text>

  <!-- Detection methods -->
  <rect x="480" y="360" width="250" height="120" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="605" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">切换检测方案</text>
  <text x="500" y="400" font-size="11" fill="#475569">1. 相似度阈值 (Embedding)</text>
  <text x="500" y="420" font-size="11" fill="#475569">2. LLM 判断 (CONTINUE/</text>
  <text x="516" y="436" font-size="11" fill="#475569">SWITCH/RESUME)</text>
  <text x="500" y="456" font-size="11" fill="#475569">3. 实体变化检测</text>
  <text x="500" y="472" font-size="11" fill="#475569">4. 超时自动清理 (3-5层限制)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>