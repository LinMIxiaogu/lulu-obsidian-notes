  <rect x="50" y="300" width="1100" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="322" fill="#475569" font-size="12" font-weight="bold">能力层 (核心服务)</text>

  <!-- LLM网关 -->
  <rect x="80" y="335" width="240" height="100" rx="6" fill="#1e293b"/>
  <text x="200" y="355" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">LLM 网关 (Model Gateway)</text>
  <rect x="95" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="142" y="379" text-anchor="middle" fill="#1e293b" font-size="10">多模型路由</text>
  <rect x="200" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="247" y="379" text-anchor="middle" fill="#1e293b" font-size="10">负载均衡</text>
  <rect x="95" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="142" y="404" text-anchor="middle" fill="#1e293b" font-size="10">语义缓存</text>
  <rect x="200" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="247" y="404" text-anchor="middle" fill="#1e293b" font-size="10">成本控制</text>
  <rect x="95" y="415" width="200" height="16" rx="3" fill="#f1f5f9"/>
  <text x="195" y="427" text-anchor="middle" fill="#475569" font-size="9">降级: 主模型不可用 -> 备用模型</text>

  <!-- 工具执行引擎 -->
  <rect x="345" y="335" width="240" height="100" rx="6" fill="#1e293b"/>
  <text x="465" y="355" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">工具执行引擎</text>
  <rect x="360" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="407" y="379" text-anchor="middle" fill="#1e293b" font-size="10">Docker 沙箱</text>
  <rect x="465" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="512" y="379" text-anchor="middle" fill="#1e293b" font-size="10">权限控制</text>
  <rect x="360" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="407" y="404" text-anchor="middle" fill="#1e293b" font-size="10">MCP Server</text>
  <rect x="465" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="512" y="404" text-anchor="middle" fill="#1e293b" font-size="10">工具审核</text>
  <rect x="360" y="415" width="200" height="16" rx="3" fill="#f1f5f9"/>
  <text x="460" y="427" text-anchor="middle" fill="#475569" font-size="9">版本管理 + 灰度升级</text>

  <!-- 知识库服务 -->
  <rect x="610" y="335" width="240" height="100" rx="6" fill="#1e293b"/>
  <text x="730" y="355" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">知识库服务</text>
  <rect x="625" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="672" y="379" text-anchor="middle" fill="#1e293b" font-size="10">向量检索</text>
  <rect x="730" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="777" y="379" text-anchor="middle" fill="#1e293b" font-size="10">全文检索</text>
  <rect x="625" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="672" y="404" text-anchor="middle" fill="#1e293b" font-size="10">RAG Pipeline</text>
