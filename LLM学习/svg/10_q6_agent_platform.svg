  <text x="777" y="404" text-anchor="middle" fill="#1e293b" font-size="10">文档解析</text>
  <rect x="625" y="415" width="200" height="16" rx="3" fill="#f1f5f9"/>
  <text x="725" y="427" text-anchor="middle" fill="#475569" font-size="9">智能分块 + 混合检索 + Reranker</text>

  <!-- 记忆服务 -->
  <rect x="875" y="335" width="240" height="100" rx="6" fill="#1e293b"/>
  <text x="995" y="355" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">记忆服务</text>
  <rect x="890" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="937" y="379" text-anchor="middle" fill="#1e293b" font-size="10">短期记忆</text>
  <rect x="995" y="365" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="1042" y="379" text-anchor="middle" fill="#1e293b" font-size="10">长期记忆</text>
  <rect x="890" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="937" y="404" text-anchor="middle" fill="#1e293b" font-size="10">用户画像</text>
  <rect x="995" y="390" width="95" height="20" rx="3" fill="#f1f5f9"/>
  <text x="1042" y="404" text-anchor="middle" fill="#1e293b" font-size="10">跨会话复用</text>

  <line x1="600" y1="450" x2="600" y2="480" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 基础设施层 ===== -->
  <rect x="50" y="480" width="1100" height="105" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="502" fill="#475569" font-size="12" font-weight="bold">基础设施层</text>

  <rect x="80" y="512" width="200" height="60" rx="6" fill="#1e293b"/>
  <text x="180" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">多租户隔离</text>
  <text x="180" y="548" text-anchor="middle" fill="#ffffff" font-size="10">K8s Namespace + 数据分区</text>
  <text x="180" y="562" text-anchor="middle" fill="#ffffff" font-size="10">资源配额 + 网络策略</text>

  <rect x="310" y="512" width="200" height="60" rx="6" fill="#1e293b"/>
  <text x="410" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">日志 + 链路追踪</text>
  <text x="410" y="548" text-anchor="middle" fill="#ffffff" font-size="10">OpenTelemetry + LangSmith</text>
  <text x="410" y="562" text-anchor="middle" fill="#ffffff" font-size="10">Prometheus + Grafana</text>

  <rect x="540" y="512" width="200" height="60" rx="6" fill="#1e293b"/>
  <text x="640" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">配置中心</text>
  <text x="640" y="548" text-anchor="middle" fill="#ffffff" font-size="10">Nacos / Apollo</text>
  <text x="640" y="562" text-anchor="middle" fill="#ffffff" font-size="10">动态配置 + 灰度发布</text>

  <rect x="770" y="512" width="170" height="60" rx="6" fill="#1e293b"/>
  <text x="855" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">密钥管理</text>
  <text x="855" y="548" text-anchor="middle" fill="#ffffff" font-size="10">Vault + 租户隔离</text>
  <text x="855" y="562" text-anchor="middle" fill="#ffffff" font-size="10">API Key 加密存储</text>

  <rect x="970" y="512" width="150" height="60" rx="6" fill="#1e293b"/>
  <text x="1045" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">审计日志</text>
  <text x="1045" y="548" text-anchor="middle" fill="#ffffff" font-size="10">操作可追溯</text>
  <text x="1045" y="562" text-anchor="middle" fill="#ffffff" font-size="10">合规审计</text>

  <!-- ===== Agent生命周期 ===== -->
  <rect x="50" y="605" width="1100" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="627" fill="#475569" font-size="12" font-weight="bold">Agent 生命周期管理 (AgentOps)</text>

  <rect x="120" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="160" y="647" text-anchor="middle" fill="#ffffff" font-size="10">创建</text>
  <line x1="200" y1="643" x2="225" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="225" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="265" y="647" text-anchor="middle" fill="#ffffff" font-size="10">开发</text>
  <line x1="305" y1="643" x2="330" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="330" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="370" y="647" text-anchor="middle" fill="#ffffff" font-size="10">测试</text>
  <line x1="410" y1="643" x2="435" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="435" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="475" y="647" text-anchor="middle" fill="#ffffff" font-size="10">审核</text>
  <line x1="515" y1="643" x2="540" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="540" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="580" y="647" text-anchor="middle" fill="#ffffff" font-size="10">部署</text>
  <line x1="620" y1="643" x2="645" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="645" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="685" y="647" text-anchor="middle" fill="#ffffff" font-size="10">监控</text>
  <line x1="725" y1="643" x2="750" y2="643" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="750" y="632" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="790" y="647" text-anchor="middle" fill="#ffffff" font-size="10">迭代</text>

  <!-- 反馈循环箭头 -->
  <path d="M 790 654 L 790 660 Q 790 665 785 665 L 165 665 Q 160 665 160 660 L 160 654" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="475" y="673" text-anchor="middle" fill="#475569" font-size="10">反馈驱动优化闭环</text>

  <!-- 底部指标 -->
  <rect x="100" y="695" width="1000" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="130" y="717" fill="#1e293b" font-size="12" font-weight="bold">关键指标:</text>
  <text x="230" y="717" fill="#475569" font-size="11">Agent 创建到上线 &lt;1天</text>
  <text x="430" y="717" fill="#475569" font-size="11">平台可用性 >99.9%</text>
  <text x="630" y="717" fill="#475569" font-size="11">租户数据泄露 0 事件</text>
  <text x="860" y="717" fill="#475569" font-size="11">新工具接入 &lt;2h</text>
  <text x="130" y="740" fill="#475569" font-size="11">参考: 字节 Agent TARS(框架) + Coze(平台) + 扣子空间(应用) 三层体系</text>
  <text x="700" y="740" fill="#475569" font-size="11">难点: 通用性 vs 定制化 | 评估标准化 | 成本分摊</text>
</svg>