<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="780" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="400" y="15" width="400" height="40" rx="8" fill="#1e293b"/>
  <text x="600" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Agent 中台 / 平台架构</text>

  <!-- ===== 用户界面层 ===== -->
  <rect x="50" y="70" width="1100" height="85" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="92" fill="#475569" font-size="12" font-weight="bold">用户界面层</text>

  <rect x="80" y="102" width="220" height="42" rx="6" fill="#1e293b"/>
  <text x="190" y="120" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Agent Studio</text>
  <text x="190" y="136" text-anchor="middle" fill="#ffffff" font-size="10">对话式 + 拖拽式双模编排</text>

  <rect x="320" y="102" width="180" height="42" rx="6" fill="#1e293b"/>
  <text x="410" y="120" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">工具市场</text>
  <text x="410" y="136" text-anchor="middle" fill="#ffffff" font-size="10">内置 + 自定义 + MCP</text>

  <rect x="520" y="102" width="180" height="42" rx="6" fill="#1e293b"/>
  <text x="610" y="120" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">监控大盘</text>
  <text x="610" y="136" text-anchor="middle" fill="#ffffff" font-size="10">质量 / 性能 / 成本</text>

  <rect x="720" y="102" width="180" height="42" rx="6" fill="#1e293b"/>
  <text x="810" y="120" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">管理后台</text>
  <text x="810" y="136" text-anchor="middle" fill="#ffffff" font-size="10">权限 / 租户 / 配额</text>

  <rect x="920" y="102" width="200" height="42" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1020" y="120" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Prompt 管理</text>
  <text x="1020" y="136" text-anchor="middle" fill="#475569" font-size="10">版本控制 / A/B / 灰度</text>

  <line x1="600" y1="155" x2="600" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 编排引擎层 ===== -->
  <rect x="50" y="180" width="1100" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="202" fill="#475569" font-size="12" font-weight="bold">编排引擎层</text>

  <rect x="80" y="212" width="250" height="48" rx="6" fill="#1e293b"/>
  <text x="205" y="232" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">工作流引擎 (DAG)</text>
  <text x="205" y="250" text-anchor="middle" fill="#ffffff" font-size="10">条件 / 循环 / 并行 / 子流程</text>

  <rect x="360" y="212" width="230" height="48" rx="6" fill="#1e293b"/>
  <text x="475" y="232" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">对话引擎</text>
  <text x="475" y="250" text-anchor="middle" fill="#ffffff" font-size="10">多轮管理 / 状态机 / 记忆</text>

  <rect x="620" y="212" width="230" height="48" rx="6" fill="#1e293b"/>
  <text x="735" y="232" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Agent 调度器</text>
  <text x="735" y="250" text-anchor="middle" fill="#ffffff" font-size="10">负载均衡 + 优先级 + 超时</text>

  <rect x="880" y="212" width="240" height="48" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1000" y="232" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">评估服务</text>
  <text x="1000" y="250" text-anchor="middle" fill="#475569" font-size="10">自动化评测 / A/B实验 / 质量门禁</text>

  <line x1="600" y1="270" x2="600" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

