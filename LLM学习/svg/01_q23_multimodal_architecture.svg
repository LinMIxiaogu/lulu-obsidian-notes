<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="900" height="420" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">多模态 LLM 架构 (以 LLaVA 为例)</text>

  <!-- Image input -->
  <rect x="40" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="110" y="110" text-anchor="middle" font-size="13" fill="#1e293b">图像输入</text>
  <rect x="65" y="120" width="90" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="110" y="142" text-anchor="middle" font-size="10" fill="#475569">224x224 / 动态</text>

  <!-- Arrow -->
  <line x1="180" y1="120" x2="220" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Vision Encoder -->
  <rect x="225" y="70" width="160" height="100" rx="8" fill="#1e293b"/>
  <text x="305" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">视觉编码器</text>
  <text x="305" y="120" text-anchor="middle" font-size="11" fill="#ffffff">Vision Encoder</text>
  <text x="305" y="145" text-anchor="middle" font-size="10" fill="#ffffff">CLIP ViT-L/14</text>
  <text x="305" y="160" text-anchor="middle" font-size="10" fill="#ffffff">输出: 视觉特征序列</text>

  <!-- Arrow -->
  <line x1="385" y1="120" x2="425" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Projection -->
  <rect x="430" y="70" width="140" height="100" rx="8" fill="#1e293b"/>
  <text x="500" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">投影层</text>
  <text x="500" y="120" text-anchor="middle" font-size="11" fill="#ffffff">Projection</text>
  <text x="500" y="145" text-anchor="middle" font-size="10" fill="#ffffff">MLP / Cross-Attn</text>
  <text x="500" y="160" text-anchor="middle" font-size="10" fill="#ffffff">视觉->文本空间</text>

  <!-- Arrow down from projection -->
  <line x1="500" y1="170" x2="500" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Text input -->
  <rect x="40" y="210" width="140" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="110" y="232" text-anchor="middle" font-size="13" fill="#1e293b">文本输入</text>
  <text x="110" y="250" text-anchor="middle" font-size="10" fill="#475569">Tokenize</text>

  <!-- Arrow -->
  <line x1="180" y1="235" x2="220" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Text Embedding -->
  <rect x="225" y="210" width="160" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="305" y="232" text-anchor="middle" font-size="13" fill="#1e293b">文本嵌入</text>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="#475569">Text Embedding</text>

  <!-- Arrow to concat -->
  <line x1="385" y1="235" x2="425" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Concat -->
  <rect x="430" y="210" width="140" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="500" y="232" text-anchor="middle" font-size="13" fill="#1e293b">拼接</text>
  <text x="500" y="250" text-anchor="middle" font-size="10" fill="#475569">[视觉token + 文本token]</text>

  <!-- Arrow to LLM -->
  <line x1="570" y1="235" x2="620" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- LLM -->
  <rect x="625" y="70" width="240" height="200" rx="8" fill="#1e293b"/>
  <text x="745" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">LLM Backbone</text>
  <text x="745" y="130" text-anchor="middle" font-size="12" fill="#ffffff">Decoder-only</text>
  <text x="745" y="155" text-anchor="middle" font-size="11" fill="#ffffff">自回归生成</text>
  <line x1="655" y1="170" x2="835" y2="170" stroke="#475569" stroke-width="0.5"/>
  <text x="745" y="195" text-anchor="middle" font-size="11" fill="#ffffff">统一处理视觉+文本</text>
  <text x="745" y="215" text-anchor="middle" font-size="11" fill="#ffffff">token 序列</text>
  <text x="745" y="250" text-anchor="middle" font-size="11" fill="#ffffff">LLaMA / Qwen / GPT</text>

  <!-- Output arrow -->
  <line x1="745" y1="270" x2="745" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="665" y="300" width="160" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="745" y="323" text-anchor="middle" font-size="13" fill="#1e293b">文本输出</text>

  <!-- Training stages -->
  <g transform="translate(40,345)">
    <rect width="400" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="200" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">两阶段训练</text>
    <text x="15" y="40" font-size="11" fill="#475569">阶段1: 冻结 VE+LLM, 只训练投影层 (对齐)</text>
    <text x="15" y="55" font-size="11" fill="#475569">阶段2: 冻结 VE, 训练投影层+LLM (指令微调)</text>
  </g>

  <g transform="translate(460,345)">
    <rect width="400" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="200" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Agent 应用场景</text>
    <text x="15" y="40" font-size="11" fill="#475569">GUI Agent / 文档理解 / 机器人视觉</text>
    <text x="15" y="55" font-size="11" fill="#475569">CogAgent, WebVoyager, GPT-4V</text>
  </g>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>