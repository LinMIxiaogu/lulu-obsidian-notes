<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="620" height="340" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <text x="310" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">微软 GraphRAG 核心流程</text>

  <!-- Step 1: 实体关系抽取 -->
  <rect x="20" y="55" width="110" height="54" rx="8" fill="#1e293b"/>
  <text x="75" y="76" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">1. 实体/关系</text>
  <text x="75" y="96" text-anchor="middle" font-size="11" fill="#e2e8f0">LLM 抽取</text>

  <line x1="130" y1="82" x2="155" y2="82" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 2: 知识图谱 -->
  <rect x="160" y="55" width="110" height="54" rx="8" fill="#1e293b"/>
  <text x="215" y="76" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">2. 构建图谱</text>
  <text x="215" y="96" text-anchor="middle" font-size="11" fill="#e2e8f0">合并 + 消歧</text>

  <line x1="270" y1="82" x2="295" y2="82" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 3: 社区检测 -->
  <rect x="300" y="55" width="110" height="54" rx="8" fill="#1e293b"/>
  <text x="355" y="76" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">3. 社区检测</text>
  <text x="355" y="96" text-anchor="middle" font-size="11" fill="#e2e8f0">Leiden 算法</text>

  <line x1="410" y1="82" x2="435" y2="82" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Step 4: 社区摘要 -->
  <rect x="440" y="55" width="160" height="54" rx="8" fill="#1e293b"/>
  <text x="520" y="76" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">4. 社区摘要生成</text>
  <text x="520" y="96" text-anchor="middle" font-size="11" fill="#e2e8f0">分层递归摘要</text>

  <!-- 分隔线 -->
  <line x1="20" y1="125" x2="600" y2="125" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- 图谱可视化示意 -->
  <text x="155" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">知识图谱结构</text>

  <!-- 简化的图示 -->
  <circle cx="80" cy="190" r="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="194" text-anchor="middle" font-size="10" fill="#1e293b">实体A</text>

  <circle cx="160" cy="165" r="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="160" y="169" text-anchor="middle" font-size="10" fill="#1e293b">实体B</text>

  <circle cx="160" cy="215" r="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="160" y="219" text-anchor="middle" font-size="10" fill="#1e293b">实体C</text>

  <circle cx="240" cy="190" r="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="240" y="194" text-anchor="middle" font-size="10" fill="#1e293b">实体D</text>

  <!-- 图谱连线 -->
  <line x1="97" y1="182" x2="142" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <line x1="97" y1="198" x2="142" y2="210" stroke="#94a3b8" stroke-width="1"/>
  <line x1="178" y1="170" x2="223" y2="185" stroke="#94a3b8" stroke-width="1"/>
  <line x1="178" y1="210" x2="223" y2="195" stroke="#94a3b8" stroke-width="1"/>
  <line x1="160" y1="183" x2="160" y2="197" stroke="#94a3b8" stroke-width="1"/>

  <!-- 社区圈 -->
  <ellipse cx="120" cy="190" rx="65" ry="45" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="245" text-anchor="middle" font-size="10" fill="#475569">社区 1</text>

  <ellipse cx="200" cy="190" rx="60" ry="45" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="245" text-anchor="middle" font-size="10" fill="#475569">社区 2</text>

  <!-- 查询阶段 -->
  <line x1="310" y1="135" x2="310" y2="340" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>

  <text x="465" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">查询阶段</text>

  <!-- Local Search -->
  <rect x="340" y="163" width="240" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="460" y="183" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="bold">Local Search（局部搜索）</text>
  <text x="460" y="200" text-anchor="middle" font-size="10" fill="#475569">Query → 匹配实体 → 扩展邻居 →</text>
  <text x="460" y="213" text-anchor="middle" font-size="10" fill="#475569">召回社区摘要 + 原文</text>

  <!-- Global Search -->
  <rect x="340" y="230" width="240" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="460" y="250" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="bold">Global Search（全局搜索）</text>
  <text x="460" y="267" text-anchor="middle" font-size="10" fill="#475569">利用高层社区摘要回答</text>
  <text x="460" y="280" text-anchor="middle" font-size="10" fill="#475569">全局性总结类问题</text>

  <!-- 底部标注 -->
  <rect x="30" y="296" width="560" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="310" y="317" text-anchor="middle" font-size="11" fill="#475569">适用场景：多跳推理 | 复杂关系查询 | 全局性总结 | 结构化知识密集领域</text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>