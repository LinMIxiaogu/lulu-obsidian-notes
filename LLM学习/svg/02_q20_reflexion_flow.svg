<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="900" height="460" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Reflexion 自我反思推理模式</text>

  <!-- Main Reflexion Loop -->
  <g transform="translate(30,55)">
    <rect width="520" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="520" height="28" rx="8" fill="#1e293b"/>
    <text x="260" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Reflexion 工作流程</text>

    <!-- Episode 1 -->
    <text x="15" y="52" font-size="12" font-weight="bold" fill="#1e293b">Episode 1:</text>

    <!-- Actor -->
    <rect x="20" y="62" width="110" height="35" rx="6" fill="#1e293b"/>
    <text x="75" y="84" text-anchor="middle" font-size="12" fill="#ffffff">Actor 执行</text>
    <line x1="130" y1="80" x2="155" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- Result -->
    <rect x="160" y="62" width="110" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="215" y="84" text-anchor="middle" font-size="12" fill="#1e293b">执行结果</text>
    <line x1="270" y1="80" x2="295" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- Evaluator -->
    <rect x="300" y="62" width="110" height="35" rx="6" fill="#1e293b"/>
    <text x="355" y="84" text-anchor="middle" font-size="12" fill="#ffffff">Evaluator</text>
    <text x="435" y="80" font-size="11" fill="#475569">失败</text>
    <line x1="410" y1="80" x2="430" y2="80" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Self-Reflection -->
    <line x1="355" y1="97" x2="355" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>
    <rect x="200" y="115" width="310" height="55" rx="6" fill="#1e293b"/>
    <text x="355" y="136" text-anchor="middle" font-size="12" fill="#ffffff">Self-Reflection 生成反思</text>
    <text x="355" y="156" text-anchor="middle" font-size="10" fill="#ffffff">"第3步API参数错误, 应用user_id..."</text>

    <!-- Memory -->
    <line x1="355" y1="170" x2="355" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>
    <rect x="260" y="190" width="190" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="355" y="210" text-anchor="middle" font-size="12" fill="#1e293b">反思存入记忆</text>

    <!-- Episode 2 -->
    <text x="15" y="245" font-size="12" font-weight="bold" fill="#1e293b">Episode 2:</text>

    <!-- Loop back -->
    <rect x="20" y="255" width="150" height="35" rx="6" fill="#1e293b"/>
    <text x="95" y="277" text-anchor="middle" font-size="12" fill="#ffffff">Actor + 反思记忆</text>
    <line x1="170" y1="273" x2="205" y2="273" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>
    <rect x="210" y="255" width="130" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="275" y="277" text-anchor="middle" font-size="12" fill="#1e293b">避免之前错误</text>
    <line x1="340" y1="273" x2="375" y2="273" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr5)"/>
    <rect x="380" y="255" width="120" height="35" rx="6" fill="#1e293b"/>
    <text x="440" y="277" text-anchor="middle" font-size="12" fill="#ffffff">成功!</text>

    <!-- Curved arrow from memory to episode 2 -->
    <path d="M 260 210 Q 20 210 20 255" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr5)"/>
  </g>

  <!-- Right side: Comparison -->
  <g transform="translate(575,55)">
    <rect width="300" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="300" height="28" rx="8" fill="#1e293b"/>
    <text x="150" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">ReAct vs Reflexion vs ReWOO</text>

    <!-- ReAct -->
    <text x="15" y="55" font-size="12" font-weight="bold" fill="#1e293b">ReAct:</text>
    <rect x="15" y="65" width="55" height="20" rx="3" fill="#1e293b"/><text x="42" y="79" text-anchor="middle" font-size="9" fill="#ffffff">Think</text>
    <line x1="73" y1="75" x2="83" y2="75" stroke="#94a3b8" stroke-width="1"/>
    <rect x="86" y="65" width="45" height="20" rx="3" fill="#1e293b"/><text x="108" y="79" text-anchor="middle" font-size="9" fill="#ffffff">Act</text>
    <line x1="134" y1="75" x2="144" y2="75" stroke="#94a3b8" stroke-width="1"/>
    <rect x="147" y="65" width="55" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="174" y="79" text-anchor="middle" font-size="9" fill="#1e293b">Observe</text>
    <line x1="205" y1="75" x2="215" y2="75" stroke="#94a3b8" stroke-width="1"/>
    <text x="225" y="79" font-size="10" fill="#475569">...</text>
    <text x="15" y="100" font-size="10" fill="#475569">短期记忆, 每步调LLM</text>

    <!-- Reflexion -->
    <text x="15" y="125" font-size="12" font-weight="bold" fill="#1e293b">Reflexion:</text>
    <rect x="15" y="135" width="55" height="20" rx="3" fill="#1e293b"/><text x="42" y="149" text-anchor="middle" font-size="9" fill="#ffffff">Execute</text>
    <line x1="73" y1="145" x2="83" y2="145" stroke="#94a3b8" stroke-width="1"/>
    <rect x="86" y="135" width="55" height="20" rx="3" fill="#1e293b"/><text x="113" y="149" text-anchor="middle" font-size="9" fill="#ffffff">Evaluate</text>
    <line x1="144" y1="145" x2="154" y2="145" stroke="#94a3b8" stroke-width="1"/>
    <rect x="157" y="135" width="55" height="20" rx="3" fill="#1e293b"/><text x="184" y="149" text-anchor="middle" font-size="9" fill="#ffffff">Reflect</text>
    <path d="M 215 145 Q 240 145 240 165 Q 240 185 15 185 Q 5 175 5 165 Q 5 155 15 145" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arr5)"/>
    <text x="15" y="200" font-size="10" fill="#475569">跨轮反思记忆, 自纠错</text>

    <!-- ReWOO -->
    <text x="15" y="230" font-size="12" font-weight="bold" fill="#1e293b">ReWOO:</text>
    <rect x="15" y="240" width="75" height="20" rx="3" fill="#1e293b"/><text x="52" y="254" text-anchor="middle" font-size="9" fill="#ffffff">Plan (1次)</text>
    <line x1="93" y1="250" x2="103" y2="250" stroke="#94a3b8" stroke-width="1"/>
    <rect x="106" y="240" width="80" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="146" y="254" text-anchor="middle" font-size="9" fill="#1e293b">Execute all</text>
    <line x1="189" y1="250" x2="199" y2="250" stroke="#94a3b8" stroke-width="1"/>
    <rect x="202" y="240" width="80" height="20" rx="3" fill="#1e293b"/><text x="242" y="254" text-anchor="middle" font-size="9" fill="#ffffff">合成 (1次)</text>
    <text x="15" y="280" font-size="10" fill="#475569">减少 LLM 调用, 批量执行</text>

    <!-- Key difference -->
    <line x1="15" y1="292" x2="285" y2="292" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">核心区别</text>
    <text x="15" y="332" font-size="10" fill="#475569">ReAct: 即时反馈, 无记忆</text>
    <text x="15" y="350" font-size="10" fill="#475569">Reflexion: 语言化反思+跨轮记忆</text>
    <text x="15" y="368" font-size="10" fill="#475569">ReWOO: 先规划后执行, 省调用</text>
  </g>

  <!-- Bottom: 3 components -->
  <g transform="translate(30,390)">
    <rect x="0" y="0" width="270" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="135" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Actor</text>
    <text x="135" y="36" text-anchor="middle" font-size="10" fill="#475569">执行动作的 Agent</text>
    <text x="135" y="50" text-anchor="middle" font-size="10" fill="#475569">(可用 ReAct 风格)</text>
  </g>
  <g transform="translate(315,390)">
    <rect x="0" y="0" width="270" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="135" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Evaluator</text>
    <text x="135" y="36" text-anchor="middle" font-size="10" fill="#475569">评估执行结果</text>
    <text x="135" y="50" text-anchor="middle" font-size="10" fill="#475569">(外部测试/LLM 判断)</text>
  </g>
  <g transform="translate(600,390)">
    <rect x="0" y="0" width="270" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="135" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Self-Reflection</text>
    <text x="135" y="36" text-anchor="middle" font-size="10" fill="#475569">语言化失败原因</text>
    <text x="135" y="50" text-anchor="middle" font-size="10" fill="#475569">(为什么错+怎么改)</text>
  </g>

  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>