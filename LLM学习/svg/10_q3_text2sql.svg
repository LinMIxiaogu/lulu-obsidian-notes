<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="720" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="330" y="15" width="440" height="40" rx="8" fill="#1e293b"/>
  <text x="550" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Text-to-SQL Agent 架构</text>

  <!-- ===== 用户输入 ===== -->
  <rect x="380" y="70" width="340" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="550" y="95" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">用户自然语言提问</text>
  <text x="550" y="108" text-anchor="middle" fill="#475569" font-size="10">"上个月各城市GMV排名前10"</text>

  <line x1="550" y1="110" x2="550" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 输入理解层 ===== -->
  <rect x="60" y="140" width="480" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="90" y="162" fill="#475569" font-size="12" font-weight="bold">输入理解层</text>

  <rect x="80" y="175" width="100" height="50" rx="4" fill="#1e293b"/>
  <text x="130" y="196" text-anchor="middle" fill="#ffffff" font-size="12">意图识别</text>
  <text x="130" y="212" text-anchor="middle" fill="#ffffff" font-size="10">分析 / 报表</text>

  <rect x="200" y="175" width="100" height="50" rx="4" fill="#1e293b"/>
  <text x="250" y="196" text-anchor="middle" fill="#ffffff" font-size="12">实体抽取</text>
  <text x="250" y="212" text-anchor="middle" fill="#ffffff" font-size="10">指标 / 维度</text>

  <rect x="320" y="175" width="100" height="50" rx="4" fill="#1e293b"/>
  <text x="370" y="196" text-anchor="middle" fill="#ffffff" font-size="12">时间解析</text>
  <text x="370" y="212" text-anchor="middle" fill="#ffffff" font-size="10">"上个月"</text>

  <rect x="440" y="175" width="85" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="482" y="196" text-anchor="middle" fill="#1e293b" font-size="11">追问融合</text>
  <text x="482" y="212" text-anchor="middle" fill="#475569" font-size="10">上下文</text>

  <!-- ===== Schema理解层 ===== -->
  <rect x="560" y="140" width="480" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="590" y="162" fill="#475569" font-size="12" font-weight="bold">Schema 理解层</text>

  <rect x="580" y="175" width="130" height="50" rx="4" fill="#1e293b"/>
  <text x="645" y="196" text-anchor="middle" fill="#ffffff" font-size="12">Schema 检索</text>
  <text x="645" y="212" text-anchor="middle" fill="#ffffff" font-size="10">向量+BM25 Top-10表</text>

  <rect x="730" y="175" width="130" height="50" rx="4" fill="#1e293b"/>
  <text x="795" y="196" text-anchor="middle" fill="#ffffff" font-size="12">术语词典</text>
  <text x="795" y="212" text-anchor="middle" fill="#ffffff" font-size="10">GMV=订单金额</text>

  <rect x="880" y="175" width="130" height="50" rx="4" fill="#1e293b"/>
  <text x="945" y="196" text-anchor="middle" fill="#ffffff" font-size="12">表关联图</text>
  <text x="945" y="212" text-anchor="middle" fill="#ffffff" font-size="10">FK关系 + JOIN</text>

  <!-- 箭头到SQL生成 -->
  <line x1="300" y1="240" x2="450" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="240" x2="650" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== SQL生成层 ===== -->
  <rect x="200" y="280" width="700" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="302" fill="#475569" font-size="12" font-weight="bold">SQL 生成层</text>

  <rect x="230" y="315" width="170" height="55" rx="6" fill="#1e293b"/>
  <text x="315" y="337" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Prompt 构建</text>
  <text x="315" y="353" text-anchor="middle" fill="#ffffff" font-size="10">Schema + Few-shot + Query</text>
  <text x="315" y="365" text-anchor="middle" fill="#ffffff" font-size="10">相似历史 Query 检索</text>

  <line x1="400" y1="342" x2="440" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="440" y="315" width="170" height="55" rx="6" fill="#1e293b"/>
  <text x="525" y="337" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">LLM 生成 SQL</text>
  <text x="525" y="355" text-anchor="middle" fill="#ffffff" font-size="10">GPT-4o / DeepSeek-V3</text>

  <line x1="610" y1="342" x2="650" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="315" width="170" height="55" rx="6" fill="#1e293b"/>
  <text x="735" y="337" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">SQL 语法校验</text>
  <text x="735" y="355" text-anchor="middle" fill="#ffffff" font-size="10">sqlparse AST 分析</text>

  <!-- 纠错循环 -->
  <path d="M 735 370 L 735 390 Q 735 395 730 395 L 530 395 Q 525 395 525 390 L 525 370" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="630" y="392" text-anchor="middle" fill="#475569" font-size="10">错误 -> 反馈LLM -> 重试(最多3次)</text>

  <!-- ===== 安全校验层 ===== -->
  <line x1="550" y1="400" x2="550" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="430" width="700" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="452" fill="#475569" font-size="12" font-weight="bold">安全校验 (零容忍)</text>

  <rect x="230" y="460" width="120" height="28" rx="4" fill="#1e293b"/>
  <text x="290" y="479" text-anchor="middle" fill="#ffffff" font-size="11">禁止非 SELECT</text>

  <rect x="370" y="460" width="120" height="28" rx="4" fill="#1e293b"/>
  <text x="430" y="479" text-anchor="middle" fill="#ffffff" font-size="11">嵌套 &lt;3 层</text>

  <rect x="510" y="460" width="120" height="28" rx="4" fill="#1e293b"/>
  <text x="570" y="479" text-anchor="middle" fill="#ffffff" font-size="11">必须有 WHERE</text>

  <rect x="650" y="460" width="100" height="28" rx="4" fill="#1e293b"/>
  <text x="700" y="479" text-anchor="middle" fill="#ffffff" font-size="11">LIMIT 限制</text>

  <rect x="770" y="460" width="110" height="28" rx="4" fill="#1e293b"/>
  <text x="825" y="479" text-anchor="middle" fill="#ffffff" font-size="11">列级权限控制</text>

  <!-- ===== 执行与展示层 ===== -->
  <line x1="550" y1="500" x2="550" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="530" width="700" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="552" fill="#475569" font-size="12" font-weight="bold">执行与展示层</text>

  <rect x="230" y="562" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="300" y="582" text-anchor="middle" fill="#ffffff" font-size="12">SQL 执行引擎</text>
  <text x="300" y="598" text-anchor="middle" fill="#ffffff" font-size="10">只读副本 + 30s超时</text>

  <line x1="370" y1="587" x2="410" y2="587" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="410" y="562" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="480" y="582" text-anchor="middle" fill="#ffffff" font-size="12">结果可视化</text>
  <text x="480" y="598" text-anchor="middle" fill="#ffffff" font-size="10">ECharts / Plotly</text>

  <line x1="550" y1="587" x2="590" y2="587" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="562" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="660" y="582" text-anchor="middle" fill="#ffffff" font-size="12">NL 总结</text>
  <text x="660" y="598" text-anchor="middle" fill="#ffffff" font-size="10">自然语言解读结果</text>

  <!-- 图表类型标注 -->
  <rect x="765" y="562" width="115" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="822" y="580" text-anchor="middle" fill="#475569" font-size="10">排名→柱状图</text>
  <text x="822" y="593" text-anchor="middle" fill="#475569" font-size="10">趋势→折线图</text>
  <text x="822" y="606" text-anchor="middle" fill="#475569" font-size="10">占比→饼图</text>

  <!-- 底部指标 -->
  <rect x="120" y="650" width="860" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="150" y="672" fill="#1e293b" font-size="12" font-weight="bold">关键指标:</text>
  <text x="250" y="672" fill="#475569" font-size="11">SQL 一次正确率 >80%</text>
  <text x="430" y="672" fill="#475569" font-size="11">含纠错后 >90%</text>
  <text x="590" y="672" fill="#475569" font-size="11">端到端 &lt;10s</text>
  <text x="730" y="672" fill="#475569" font-size="11">安全拦截率 100%</text>
  <text x="150" y="692" fill="#475569" font-size="11">核心: Schema 检索(不全放) + Few-shot 示例(RAG方式) + AST 安全校验 + 自动纠错(最多3次)</text>
</svg>