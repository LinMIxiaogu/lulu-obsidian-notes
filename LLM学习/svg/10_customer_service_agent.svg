<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="750" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="400" y="15" width="400" height="40" rx="8" fill="#1e293b"/>
  <text x="600" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">智能客服 Agent 系统架构</text>

  <!-- 用户入口层 -->
  <rect x="280" y="70" width="580" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="570" y="90" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">用户入口 (多渠道接入)</text>
  <rect x="300" y="98" width="80" height="18" rx="3" fill="#1e293b"/>
  <text x="340" y="111" text-anchor="middle" fill="#ffffff" font-size="11">Web</text>
  <rect x="400" y="98" width="80" height="18" rx="3" fill="#1e293b"/>
  <text x="440" y="111" text-anchor="middle" fill="#ffffff" font-size="11">App</text>
  <rect x="500" y="98" width="80" height="18" rx="3" fill="#1e293b"/>
  <text x="540" y="111" text-anchor="middle" fill="#ffffff" font-size="11">微信公众号</text>
  <rect x="600" y="98" width="80" height="18" rx="3" fill="#1e293b"/>
  <text x="640" y="111" text-anchor="middle" fill="#ffffff" font-size="11">小程序</text>
  <rect x="700" y="98" width="80" height="18" rx="3" fill="#1e293b"/>
  <text x="740" y="111" text-anchor="middle" fill="#ffffff" font-size="11">电话IVR</text>

  <line x1="570" y1="120" x2="570" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 接入层 -->
  <rect x="280" y="140" width="580" height="45" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="168" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">API Gateway + 负载均衡</text>
  <text x="620" y="168" fill="#475569" font-size="11">会话管理 · 鉴权 · 限流 · WebSocket长连接</text>

  <line x1="570" y1="185" x2="570" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 核心处理层 - 意图识别 -->
  <rect x="50" y="205" width="860" height="310" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="228" fill="#1e293b" font-size="14" font-weight="bold">核心处理引擎</text>

  <!-- 意图识别 -->
  <rect x="370" y="240" width="200" height="45" rx="6" fill="#1e293b"/>
  <text x="470" y="260" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">意图识别与分类</text>
  <text x="470" y="276" text-anchor="middle" fill="#ffffff" font-size="10">LLM + 微调分类器 (Ensemble)</text>

  <!-- 路由分发 -->
  <line x1="470" y1="285" x2="470" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="390" y="305" width="160" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="470" y="325" text-anchor="middle" fill="#1e293b" font-size="13">路由分发 (Router)</text>

  <!-- 子Agent矩阵 -->
  <!-- FAQ Agent -->
  <line x1="390" y1="320" x2="130" y2="370" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="70" y="370" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="140" y="393" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">FAQ Agent</text>
  <text x="140" y="410" text-anchor="middle" fill="#ffffff" font-size="10">通用问答</text>

  <!-- 工单 Agent -->
  <line x1="420" y1="335" x2="310" y2="370" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="240" y="370" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="310" y="393" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">工单 Agent</text>
  <text x="310" y="410" text-anchor="middle" fill="#ffffff" font-size="10">订单查询/物流</text>

  <!-- 退款 Agent -->
  <line x1="520" y1="335" x2="630" y2="370" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="560" y="370" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="630" y="393" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">退款 Agent</text>
  <text x="630" y="410" text-anchor="middle" fill="#ffffff" font-size="10">退换货/赔偿</text>

  <!-- 闲聊 Agent -->
  <line x1="550" y1="320" x2="790" y2="370" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="720" y="370" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="790" y="393" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">闲聊 Agent</text>
  <text x="790" y="410" text-anchor="middle" fill="#ffffff" font-size="10">情感安抚/闲聊</text>

  <!-- 子Agent底部资源 -->
  <rect x="70" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="460" text-anchor="middle" fill="#475569" font-size="11">RAG 知识库</text>
  <line x1="140" y1="420" x2="140" y2="440" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="310" y="460" text-anchor="middle" fill="#475569" font-size="11">订单API / ERP</text>
  <line x1="310" y1="420" x2="310" y2="440" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="560" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="630" y="460" text-anchor="middle" fill="#475569" font-size="11">退款API / 风控</text>
  <line x1="630" y1="420" x2="630" y2="440" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="720" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="790" y="460" text-anchor="middle" fill="#475569" font-size="11">对话模板库</text>
  <line x1="790" y1="420" x2="790" y2="440" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 底部共享层 -->
  <rect x="70" y="485" width="790" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="465" y="500" text-anchor="middle" fill="#475569" font-size="11">共享资源：向量数据库(Milvus) · MySQL/Redis · 对话历史存储 · Embedding服务 · LLM网关(路由/降级/缓存)</text>

  <!-- 人工介入 -->
  <rect x="380" y="525" width="380" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="570" y="546" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">人工介入决策</text>
  <text x="570" y="565" text-anchor="middle" fill="#475569" font-size="11">置信度 &lt; 阈值 · 敏感话题 · 用户要求 · 连续未解决 → 转人工客服坐席</text>

  <!-- 连线到人工介入 -->
  <line x1="470" y1="500" x2="470" y2="525" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 右侧管理后台 -->
  <rect x="940" y="205" width="240" height="370" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1060" y="232" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">管理后台</text>
  <line x1="960" y1="240" x2="1160" y2="240" stroke="#e2e8f0"/>

  <rect x="960" y="255" width="200" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="272" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">知识库管理</text>
  <text x="1060" y="288" text-anchor="middle" fill="#475569" font-size="10">文档上传/FAQ编辑/向量更新</text>

  <rect x="960" y="310" width="200" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="327" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">对话质检</text>
  <text x="1060" y="343" text-anchor="middle" fill="#475569" font-size="10">自动评分/Bad Case标注/抽检</text>

  <rect x="960" y="365" width="200" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="382" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">数据大盘</text>
  <text x="1060" y="398" text-anchor="middle" fill="#475569" font-size="10">实时监控/趋势分析/异常告警</text>

  <rect x="960" y="420" width="200" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="437" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Prompt 管理</text>
  <text x="1060" y="453" text-anchor="middle" fill="#475569" font-size="10">模板编辑/版本管理/A/B测试</text>

  <rect x="960" y="475" width="200" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="492" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">人工坐席工作台</text>
  <text x="1060" y="508" text-anchor="middle" fill="#475569" font-size="10">接管对话/AI辅助回复/工单流转</text>

  <rect x="960" y="530" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1060" y="550" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">权限与审计</text>

  <!-- 连线管理后台 -->
  <line x1="910" y1="350" x2="940" y2="350" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 底部核心指标 -->
  <rect x="50" y="595" width="1100" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="600" y="618" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">核心业务指标</text>
  <rect x="80" y="628" width="180" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="170" y="641" text-anchor="middle" fill="#1e293b" font-size="11">自主解决率 > 85%</text>
  <rect x="290" y="628" width="180" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="641" text-anchor="middle" fill="#1e293b" font-size="11">转人工率 &lt; 15%</text>
  <rect x="500" y="628" width="180" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="590" y="641" text-anchor="middle" fill="#1e293b" font-size="11">用户满意度 CSAT > 4.5</text>
  <rect x="710" y="628" width="180" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="800" y="641" text-anchor="middle" fill="#1e293b" font-size="11">首响时间 &lt; 3s</text>
  <rect x="920" y="628" width="200" height="18" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1020" y="641" text-anchor="middle" fill="#1e293b" font-size="11">意图识别准确率 > 95%</text>

  <!-- 底部技术栈 -->
  <rect x="50" y="665" width="1100" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="600" y="688" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">技术栈参考</text>
  <text x="600" y="708" text-anchor="middle" fill="#475569" font-size="11">LLM: GPT-4o / Claude / 文心一言  |  框架: LangGraph / Dify  |  向量库: Milvus / Weaviate  |  缓存: Redis Semantic Cache</text>
  <text x="600" y="725" text-anchor="middle" fill="#475569" font-size="11">监控: Langfuse / LangSmith  |  部署: K8s + Istio  |  消息队列: Kafka  |  搜索: Elasticsearch</text>
</svg>