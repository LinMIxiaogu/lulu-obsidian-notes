<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <defs>
    <style>
      text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L3,8 L6,0 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="750" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- 标题 -->
  <rect x="370" y="16" width="400" height="44" rx="8" fill="#1e293b"/>
  <text x="570" y="44" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">生产级 Agent 工程架构</text>

  <!-- ========== 第1层: 接入层 ========== -->
  <rect x="40" y="80" width="860" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="102" fill="#1e293b" font-size="15" font-weight="bold">接入层</text>
  <line x1="50" y1="110" x2="890" y2="110" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 接入层子模块 -->
  <rect x="60" y="120" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="145" y="140" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">API Gateway</text>
  <text x="145" y="155" text-anchor="middle" fill="#475569" font-size="11">鉴权 / 限流 / 路由</text>

  <rect x="250" y="120" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="335" y="140" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">WebSocket</text>
  <text x="335" y="155" text-anchor="middle" fill="#475569" font-size="11">双向实时通信</text>

  <rect x="440" y="120" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="525" y="140" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">SSE 流式输出</text>
  <text x="525" y="155" text-anchor="middle" fill="#475569" font-size="11">Server-Sent Events</text>

  <rect x="630" y="120" width="250" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="755" y="140" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">灰度发布</text>
  <text x="755" y="155" text-anchor="middle" fill="#475569" font-size="11">流量切分 / A-B 测试 / 金丝雀</text>

  <!-- 层间连接线 -->
  <line x1="470" y1="180" x2="470" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== 第2层: 编排层 ========== -->
  <rect x="40" y="200" width="860" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="222" fill="#1e293b" font-size="15" font-weight="bold">编排层</text>
  <line x1="50" y1="230" x2="890" y2="230" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="240" width="260" height="55" rx="6" fill="#1e293b"/>
  <text x="190" y="262" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Agent Kernel</text>
  <text x="190" y="280" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.85">ReAct / Plan-Execute 调度器</text>

  <rect x="340" y="240" width="200" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="440" y="262" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Prompt 版本管理</text>
  <text x="440" y="280" text-anchor="middle" fill="#475569" font-size="11">模板化 / 版本化 / 回滚</text>

  <rect x="560" y="240" width="160" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="640" y="262" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Feature Flag</text>
  <text x="640" y="280" text-anchor="middle" fill="#475569" font-size="11">功能开关 / 动态配置</text>

  <rect x="740" y="240" width="145" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="812" y="262" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">上下文管理</text>
  <text x="812" y="280" text-anchor="middle" fill="#475569" font-size="11">记忆 / 会话隔离</text>

  <!-- 层间连接线 -->
  <line x1="470" y1="310" x2="470" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== 第3层: 能力层 ========== -->
  <rect x="40" y="330" width="860" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="352" fill="#1e293b" font-size="15" font-weight="bold">能力层</text>
  <line x1="50" y1="360" x2="890" y2="360" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="370" width="240" height="55" rx="6" fill="#1e293b"/>
  <text x="180" y="392" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">LLM 推理</text>
  <text x="180" y="410" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.85">模型路由（GPT/Claude/开源）</text>

  <rect x="320" y="370" width="240" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">RAG 检索</text>
  <text x="440" y="410" text-anchor="middle" fill="#475569" font-size="11">向量检索 + 知识图谱 + 重排</text>

  <rect x="580" y="370" width="300" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="730" y="392" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">工具集（沙箱执行）</text>
  <text x="730" y="410" text-anchor="middle" fill="#475569" font-size="11">外部API / 数据库 / 代码沙箱 / 文件操作</text>

  <!-- 层间连接线 -->
  <line x1="470" y1="440" x2="470" y2="460" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== 第4层: 基础设施层 ========== -->
  <rect x="40" y="460" width="860" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="482" fill="#1e293b" font-size="15" font-weight="bold">基础设施层</text>
  <line x1="50" y1="490" x2="890" y2="490" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="500" width="180" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="150" y="522" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">K8s 部署</text>
  <text x="150" y="540" text-anchor="middle" fill="#475569" font-size="11">容器编排 / 弹性伸缩</text>

  <rect x="260" y="500" width="180" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="350" y="522" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">限流控制</text>
  <text x="350" y="540" text-anchor="middle" fill="#475569" font-size="11">RPM / TPM / 令牌桶</text>

  <rect x="460" y="500" width="240" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="580" y="522" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">可观测性监控</text>
  <text x="580" y="540" text-anchor="middle" fill="#475569" font-size="11">OpenTelemetry + Langfuse + 告警</text>

  <rect x="720" y="500" width="165" height="55" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="802" y="522" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Redis 缓存</text>
  <text x="802" y="540" text-anchor="middle" fill="#475569" font-size="11">语义缓存 / 会话存储</text>

  <!-- ========== 右侧: CI/CD 流水线 ========== -->
  <rect x="930" y="80" width="240" height="490" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1050" y="108" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">CI/CD 流水线</text>
  <line x1="940" y1="118" x2="1160" y2="118" stroke="#e2e8f0" stroke-width="1"/>

  <!-- CI/CD 步骤 -->
  <rect x="965" y="140" width="170" height="44" rx="6" fill="#1e293b"/>
  <text x="1050" y="160" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Prompt 测试</text>
  <text x="1050" y="175" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.85">单元测试 / 回归测试</text>

  <line x1="1050" y1="184" x2="1050" y2="216" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="965" y="216" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1050" y="236" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">自动化评估</text>
  <text x="1050" y="251" text-anchor="middle" fill="#475569" font-size="11">LLM-as-Judge / 指标打分</text>

  <line x1="1050" y1="260" x2="1050" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="965" y="292" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1050" y="312" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">灰度发布</text>
  <text x="1050" y="327" text-anchor="middle" fill="#475569" font-size="11">金丝雀 / 流量切分</text>

  <line x1="1050" y1="336" x2="1050" y2="368" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="965" y="368" width="170" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1050" y="388" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">全量上线</text>
  <text x="1050" y="403" text-anchor="middle" fill="#475569" font-size="11">监控确认 / 自动回滚</text>

  <!-- CI/CD 连接到各层的虚线 -->
  <line x1="930" y1="160" x2="900" y2="140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="310" x2="900" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="930" y1="400" x2="900" y2="480" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CI/CD 底部补充说明 -->
  <rect x="950" y="440" width="205" height="110" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1052" y="462" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">质量门禁</text>
  <line x1="960" y1="470" x2="1145" y2="470" stroke="#e2e8f0" stroke-width="1"/>
  <text x="960" y="490" fill="#475569" font-size="11">- 评估分数 >= 阈值</text>
  <text x="960" y="508" fill="#475569" font-size="11">- P99 延迟 &lt; SLA</text>
  <text x="960" y="526" fill="#475569" font-size="11">- Token 成本可控</text>
  <text x="960" y="544" fill="#475569" font-size="11">- 无安全漏洞</text>

  <!-- ========== 底部标注: 关键工程指标 ========== -->
  <rect x="40" y="590" width="860" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="615" fill="#1e293b" font-size="15" font-weight="bold">关键工程指标</text>
  <line x1="50" y1="625" x2="890" y2="625" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 指标卡片 -->
  <rect x="60" y="638" width="250" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="185" y="660" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">P99 延迟</text>
  <text x="185" y="680" text-anchor="middle" fill="#475569" font-size="12">首Token &lt; 1s | 完整响应 &lt; 10s</text>
  <text x="185" y="698" text-anchor="middle" fill="#475569" font-size="11">流式输出优化端到端体验</text>

  <rect x="330" y="638" width="250" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="455" y="660" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Token 成本</text>
  <text x="455" y="680" text-anchor="middle" fill="#475569" font-size="12">语义缓存命中率 > 30%</text>
  <text x="455" y="698" text-anchor="middle" fill="#475569" font-size="11">模型路由按复杂度分级调度</text>

  <rect x="600" y="638" width="285" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="742" y="660" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">任务成功率</text>
  <text x="742" y="680" text-anchor="middle" fill="#475569" font-size="12">端到端成功率 > 95%</text>
  <text x="742" y="698" text-anchor="middle" fill="#475569" font-size="11">兜底策略 + 重试 + 降级保障</text>
</svg>