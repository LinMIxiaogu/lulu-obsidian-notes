<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="760" height="560" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">多 Agent 记忆共享与隔离架构</text>

  <!-- Three-layer memory model -->
  <!-- Layer 1: Global Memory -->
  <rect x="40" y="60" width="680" height="70" rx="8" fill="#1e293b"/>
  <text x="380" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">全局共享记忆 (Global Memory)</text>
  <text x="380" y="104" text-anchor="middle" font-size="11" fill="#94a3b8">所有 Agent 可读，仅 Supervisor 可写 | 任务目标、用户画像、全局约束</text>
  <text x="380" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">写入控制: 防止子 Agent 错误判断污染全局状态</text>

  <!-- Layer 2: Team Memory -->
  <rect x="40" y="140" width="680" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="164" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">团队共享记忆 (Team Memory)</text>
  <text x="380" y="184" text-anchor="middle" font-size="11" fill="#475569">同一子任务组 Agent 可读写 | 子任务状态、中间结果、协作上下文</text>

  <!-- Layer 3: Private Memory (shown as individual boxes) -->
  <rect x="40" y="210" width="680" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">私有记忆 (Private Memory) - 仅单个 Agent 可访问</text>

  <!-- Agent boxes with private memory -->
  <rect x="60" y="248" width="145" height="78" rx="6" fill="#1e293b"/>
  <text x="132" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Planning Agent</text>
  <text x="132" y="288" text-anchor="middle" font-size="10" fill="#94a3b8">推理草稿</text>
  <text x="132" y="302" text-anchor="middle" font-size="10" fill="#94a3b8">任务分解缓存</text>
  <text x="132" y="316" text-anchor="middle" font-size="10" fill="#94a3b8">决策日志</text>

  <rect x="225" y="248" width="145" height="78" rx="6" fill="#1e293b"/>
  <text x="297" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Coding Agent</text>
  <text x="297" y="288" text-anchor="middle" font-size="10" fill="#94a3b8">代码片段缓存</text>
  <text x="297" y="302" text-anchor="middle" font-size="10" fill="#94a3b8">工具调用记录</text>
  <text x="297" y="316" text-anchor="middle" font-size="10" fill="#94a3b8">编译结果</text>

  <rect x="390" y="248" width="145" height="78" rx="6" fill="#1e293b"/>
  <text x="462" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Review Agent</text>
  <text x="462" y="288" text-anchor="middle" font-size="10" fill="#94a3b8">审查标准</text>
  <text x="462" y="302" text-anchor="middle" font-size="10" fill="#94a3b8">评审意见草稿</text>
  <text x="462" y="316" text-anchor="middle" font-size="10" fill="#94a3b8">历史审查记录</text>

  <rect x="555" y="248" width="145" height="78" rx="6" fill="#1e293b"/>
  <text x="627" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Supervisor</text>
  <text x="627" y="288" text-anchor="middle" font-size="10" fill="#94a3b8">全量上下文</text>
  <text x="627" y="302" text-anchor="middle" font-size="10" fill="#94a3b8">调度决策日志</text>
  <text x="627" y="316" text-anchor="middle" font-size="10" fill="#94a3b8">质量评估记录</text>

  <!-- Data flow section -->
  <rect x="40" y="358" width="330" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="205" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">上下文传递策略 (最小信息原则)</text>

  <!-- Supervisor -> Sub-Agent -->
  <rect x="60" y="396" width="130" height="32" rx="6" fill="#1e293b"/>
  <text x="125" y="417" text-anchor="middle" font-size="11" fill="#ffffff">Supervisor</text>
  <line x1="190" y1="412" x2="230" y2="412" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>
  <rect x="230" y="396" width="120" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="290" y="417" text-anchor="middle" font-size="11" fill="#1e293b">子 Agent</text>
  <text x="210" y="400" font-size="9" fill="#475569">裁剪后上下文</text>

  <!-- Sub-Agent -> Supervisor -->
  <rect x="60" y="440" width="120" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="120" y="461" text-anchor="middle" font-size="11" fill="#1e293b">子 Agent</text>
  <line x1="180" y1="456" x2="230" y2="456" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>
  <rect x="230" y="440" width="130" height="32" rx="6" fill="#1e293b"/>
  <text x="295" y="461" text-anchor="middle" font-size="11" fill="#ffffff">Supervisor</text>
  <text x="210" y="445" font-size="9" fill="#475569">结果摘要</text>

  <!-- Agent <-> Agent -->
  <rect x="80" y="486" width="240" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="509" text-anchor="middle" font-size="11" fill="#1e293b">Agent 间: Message Bus / Blackboard</text>

  <!-- Concurrency control section -->
  <rect x="390" y="358" width="330" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="555" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">并发写入控制</text>

  <rect x="410" y="396" width="140" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="480" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">乐观锁</text>
  <text x="480" y="424" text-anchor="middle" font-size="9" fill="#475569">版本号检查+重试</text>

  <rect x="560" y="396" width="140" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="630" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Event Sourcing</text>
  <text x="630" y="424" text-anchor="middle" font-size="9" fill="#475569">只追加不修改</text>

  <rect x="410" y="444" width="290" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="555" y="458" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Blackboard 架构</text>
  <text x="555" y="472" text-anchor="middle" font-size="9" fill="#475569">共享黑板 + 仲裁器决定写入生效</text>

  <!-- Consistency note -->
  <rect x="410" y="492" width="290" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="555" y="508" text-anchor="middle" font-size="11" fill="#1e293b">一致性: 通常最终一致性即可</text>
  <text x="555" y="522" text-anchor="middle" font-size="9" fill="#475569">延迟 &lt; 1s</text>

  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>