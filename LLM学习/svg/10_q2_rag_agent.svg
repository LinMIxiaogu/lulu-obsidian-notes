<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="780" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="350" y="15" width="500" height="40" rx="8" fill="#1e293b"/>
  <text x="600" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">企业知识库 RAG Agent 架构</text>

  <!-- ===== 数据接入层 ===== -->
  <rect x="50" y="70" width="1100" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="92" fill="#475569" font-size="12" font-weight="bold">数据接入层</text>

  <rect x="80" y="100" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="140" y="120" text-anchor="middle" fill="#ffffff" font-size="12">PDF / Word</text>
  <rect x="220" y="100" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="280" y="120" text-anchor="middle" fill="#ffffff" font-size="12">Confluence</text>
  <rect x="360" y="100" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="420" y="120" text-anchor="middle" fill="#ffffff" font-size="12">飞书文档</text>
  <rect x="500" y="100" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="560" y="120" text-anchor="middle" fill="#ffffff" font-size="12">数据库</text>
  <rect x="640" y="100" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="700" y="120" text-anchor="middle" fill="#ffffff" font-size="12">网页 / API</text>

  <!-- Webhook监听标注 -->
  <rect x="820" y="100" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="970" y="120" text-anchor="middle" fill="#475569" font-size="11">Webhook / 定时扫描 (增量更新)</text>

  <line x1="420" y1="140" x2="420" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 文档处理Pipeline ===== -->
  <rect x="50" y="165" width="1100" height="75" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="187" fill="#475569" font-size="12" font-weight="bold">文档处理 Pipeline</text>

  <rect x="80" y="196" width="140" height="35" rx="4" fill="#1e293b"/>
  <text x="150" y="210" text-anchor="middle" fill="#ffffff" font-size="12">格式解析</text>
  <text x="150" y="224" text-anchor="middle" fill="#ffffff" font-size="10">PyMuPDF / Unstructured</text>

  <line x1="220" y1="213" x2="260" y2="213" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="196" width="160" height="35" rx="4" fill="#1e293b"/>
  <text x="340" y="210" text-anchor="middle" fill="#ffffff" font-size="12">智能分块</text>
  <text x="340" y="224" text-anchor="middle" fill="#ffffff" font-size="10">语义 / 结构感知分块</text>

  <line x1="420" y1="213" x2="460" y2="213" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="460" y="196" width="160" height="35" rx="4" fill="#1e293b"/>
  <text x="540" y="210" text-anchor="middle" fill="#ffffff" font-size="12">Embedding 生成</text>
  <text x="540" y="224" text-anchor="middle" fill="#ffffff" font-size="10">bge-large-zh / OpenAI</text>

  <line x1="620" y1="213" x2="660" y2="213" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="196" width="160" height="35" rx="4" fill="#1e293b"/>
  <text x="740" y="210" text-anchor="middle" fill="#ffffff" font-size="12">元数据提取</text>
  <text x="740" y="224" text-anchor="middle" fill="#ffffff" font-size="10">来源 / 权限 / 时间</text>

  <line x1="820" y1="213" x2="860" y2="213" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="860" y="196" width="160" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="940" y="218" text-anchor="middle" fill="#1e293b" font-size="11">Celery 异步任务队列</text>

  <!-- 箭头到索引层 -->
  <line x1="500" y1="240" x2="500" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 索引存储层 ===== -->
  <rect x="50" y="265" width="1100" height="75" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="287" fill="#475569" font-size="12" font-weight="bold">索引存储层</text>

  <rect x="120" y="296" width="200" height="35" rx="4" fill="#1e293b"/>
  <text x="220" y="310" text-anchor="middle" fill="#ffffff" font-size="12">向量数据库 (Milvus)</text>
  <text x="220" y="324" text-anchor="middle" fill="#ffffff" font-size="10">语义匹配 + HNSW索引</text>

  <rect x="380" y="296" width="200" height="35" rx="4" fill="#1e293b"/>
  <text x="480" y="310" text-anchor="middle" fill="#ffffff" font-size="12">全文检索 (ES)</text>
  <text x="480" y="324" text-anchor="middle" fill="#ffffff" font-size="10">BM25 关键词匹配</text>

  <rect x="640" y="296" width="200" height="35" rx="4" fill="#1e293b"/>
  <text x="740" y="310" text-anchor="middle" fill="#ffffff" font-size="12">知识图谱</text>
  <text x="740" y="324" text-anchor="middle" fill="#ffffff" font-size="10">实体关系检索</text>

  <rect x="900" y="296" width="200" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="1000" y="318" text-anchor="middle" fill="#1e293b" font-size="11">版本管理 + 增量更新</text>

  <!-- ===== 检索与生成层 (核心) ===== -->
  <line x1="500" y1="340" x2="500" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="370" width="1100" height="230" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="392" fill="#475569" font-size="12" font-weight="bold">检索与生成层 (核心)</text>

  <!-- Query改写 -->
  <rect x="80" y="405" width="160" height="50" rx="6" fill="#1e293b"/>
  <text x="160" y="425" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Query 改写</text>
  <text x="160" y="445" text-anchor="middle" fill="#ffffff" font-size="10">HyDE / Multi-Query</text>

  <line x1="240" y1="430" x2="280" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 多路检索 -->
  <rect x="280" y="400" width="180" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="370" y="420" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">多路检索</text>
  <rect x="295" y="430" width="65" height="22" rx="3" fill="#1e293b"/>
  <text x="327" y="445" text-anchor="middle" fill="#ffffff" font-size="10">向量</text>
  <rect x="370" y="430" width="65" height="22" rx="3" fill="#1e293b"/>
  <text x="402" y="445" text-anchor="middle" fill="#ffffff" font-size="10">BM25</text>
  <rect x="295" y="460" width="65" height="22" rx="3" fill="#1e293b"/>
  <text x="327" y="475" text-anchor="middle" fill="#ffffff" font-size="10">图谱</text>
  <rect x="370" y="460" width="65" height="22" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="402" y="475" text-anchor="middle" fill="#475569" font-size="10">缓存</text>

  <line x1="460" y1="450" x2="500" y2="450" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RRF融合 -->
  <rect x="500" y="420" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="570" y="440" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">RRF 融合排序</text>
  <text x="570" y="458" text-anchor="middle" fill="#ffffff" font-size="10">Reciprocal Rank Fusion</text>

  <line x1="640" y1="445" x2="680" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reranker -->
  <rect x="680" y="420" width="140" height="50" rx="6" fill="#1e293b"/>
  <text x="750" y="440" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Reranker 重排</text>
  <text x="750" y="458" text-anchor="middle" fill="#ffffff" font-size="10">BGE-Reranker-v2</text>

  <line x1="820" y1="445" x2="860" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 权限过滤 -->
  <rect x="860" y="420" width="130" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="925" y="440" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">权限过滤</text>
  <text x="925" y="458" text-anchor="middle" fill="#475569" font-size="10">JWT + RBAC</text>

  <!-- Prompt构建 + LLM -->
  <line x1="570" y1="470" x2="570" y2="510" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="300" y="510" width="250" height="55" rx="6" fill="#1e293b"/>
  <text x="425" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Prompt 构建</text>
  <text x="425" y="550" text-anchor="middle" fill="#ffffff" font-size="10">Top-K 文档 + Query + 引用指令</text>

  <line x1="550" y1="537" x2="600" y2="537" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="600" y="510" width="250" height="55" rx="6" fill="#1e293b"/>
  <text x="725" y="532" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">LLM 生成</text>
  <text x="725" y="550" text-anchor="middle" fill="#ffffff" font-size="10">GPT-4o / DeepSeek-V3 流式输出</text>

  <!-- ===== 应用层 ===== -->
  <line x1="600" y1="600" x2="600" y2="625" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="625" width="1100" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="647" fill="#475569" font-size="12" font-weight="bold">应用层</text>

  <rect x="120" y="656" width="150" height="28" rx="4" fill="#1e293b"/>
  <text x="195" y="675" text-anchor="middle" fill="#ffffff" font-size="12">答案 + 来源引用</text>

  <rect x="300" y="656" width="150" height="28" rx="4" fill="#1e293b"/>
  <text x="375" y="675" text-anchor="middle" fill="#ffffff" font-size="12">多轮追问</text>

  <rect x="480" y="656" width="150" height="28" rx="4" fill="#1e293b"/>
  <text x="555" y="675" text-anchor="middle" fill="#ffffff" font-size="12">反馈收集</text>

  <rect x="660" y="656" width="150" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="735" y="675" text-anchor="middle" fill="#1e293b" font-size="12">Grounding 验证</text>

  <rect x="840" y="656" width="150" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="915" y="675" text-anchor="middle" fill="#1e293b" font-size="12">可解释性 (原文片段)</text>

  <!-- 底部关键指标 -->
  <rect x="120" y="710" width="960" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="150" y="732" fill="#1e293b" font-size="12" font-weight="bold">关键指标:</text>
  <text x="240" y="732" fill="#475569" font-size="11">Top-5 召回率 >90%</text>
  <text x="410" y="732" fill="#475569" font-size="11">答案准确率 >85%</text>
  <text x="580" y="732" fill="#475569" font-size="11">查询延迟 &lt;5s (P95)</text>
  <text x="760" y="732" fill="#475569" font-size="11">引用准确率 >95%</text>
  <text x="940" y="732" fill="#475569" font-size="11">10万+ 文档</text>
  <text x="150" y="750" fill="#475569" font-size="11">难点: 表格/图表信息丢失 | 跨文档关联 | 大规模检索性能 | 矛盾信息处理</text>
</svg>