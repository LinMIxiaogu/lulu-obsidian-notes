<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 370" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="620" height="370" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <text x="310" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Agentic RAG 三种方案对比</text>

  <!-- Self-RAG -->
  <text x="105" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Self-RAG</text>
  <text x="105" y="72" text-anchor="middle" font-size="10" fill="#475569">模型自主判断是否检索</text>

  <rect x="30" y="82" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="105" y="104" text-anchor="middle" font-size="12" fill="#ffffff">Query 输入</text>

  <line x1="105" y1="116" x2="105" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="30" y="133" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="155" text-anchor="middle" font-size="11" fill="#1e293b">[Retrieve] 需要检索？</text>

  <line x1="105" y1="167" x2="105" y2="181" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="30" y="184" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="206" text-anchor="middle" font-size="11" fill="#1e293b">[IsRel] 结果相关？</text>

  <line x1="105" y1="218" x2="105" y2="232" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="30" y="235" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="257" text-anchor="middle" font-size="11" fill="#1e293b">[IsSup] 生成被支持？</text>

  <line x1="105" y1="269" x2="105" y2="283" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="30" y="286" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="105" y="308" text-anchor="middle" font-size="12" fill="#ffffff">生成回答</text>

  <rect x="30" y="328" width="150" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="105" y="347" text-anchor="middle" font-size="10" fill="#475569">需微调模型学习反思Token</text>

  <!-- CRAG -->
  <line x1="210" y1="50" x2="210" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="420" y1="50" x2="420" y2="360" stroke="#e2e8f0" stroke-width="1"/>

  <text x="315" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">CRAG</text>
  <text x="315" y="72" text-anchor="middle" font-size="10" fill="#475569">检索后评估 + 纠正</text>

  <rect x="240" y="82" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="315" y="104" text-anchor="middle" font-size="12" fill="#ffffff">Query → 检索</text>

  <line x1="315" y1="116" x2="315" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="240" y="133" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="315" y="155" text-anchor="middle" font-size="11" fill="#1e293b">评估器判断质量</text>

  <!-- 三条分支 -->
  <line x1="315" y1="167" x2="315" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="248" y1="180" x2="382" y2="180" stroke="#94a3b8" stroke-width="1.5"/>

  <line x1="248" y1="180" x2="248" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="315" y1="180" x2="315" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="382" y1="180" x2="382" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="224" y="198" width="50" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="249" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">正确</text>
  <text x="249" y="232" text-anchor="middle" font-size="9" fill="#475569">知识精炼</text>

  <rect x="290" y="198" width="50" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="315" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">模糊</text>
  <text x="315" y="232" text-anchor="middle" font-size="9" fill="#475569">两者结合</text>

  <rect x="357" y="198" width="50" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="382" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">错误</text>
  <text x="382" y="232" text-anchor="middle" font-size="9" fill="#475569">Web搜索</text>

  <line x1="248" y1="242" x2="248" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="315" y1="242" x2="315" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="382" y1="242" x2="382" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="248" y1="260" x2="382" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="315" y1="260" x2="315" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="240" y="281" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="315" y="303" text-anchor="middle" font-size="12" fill="#ffffff">生成回答</text>

  <rect x="240" y="328" width="150" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="315" y="347" text-anchor="middle" font-size="10" fill="#475569">无需微调，适用任何LLM</text>

  <!-- Adaptive RAG -->
  <text x="520" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Adaptive RAG</text>
  <text x="520" y="72" text-anchor="middle" font-size="10" fill="#475569">按查询复杂度选策略</text>

  <rect x="445" y="82" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="520" y="104" text-anchor="middle" font-size="12" fill="#ffffff">Query 输入</text>

  <line x1="520" y1="116" x2="520" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="445" y="133" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="520" y="155" text-anchor="middle" font-size="11" fill="#1e293b">复杂度分类器</text>

  <line x1="520" y1="167" x2="520" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="462" y1="180" x2="578" y2="180" stroke="#94a3b8" stroke-width="1.5"/>

  <line x1="462" y1="180" x2="462" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="520" y1="180" x2="520" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="578" y1="180" x2="578" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="435" y="198" width="54" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="462" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">简单</text>
  <text x="462" y="232" text-anchor="middle" font-size="9" fill="#475569">直接回答</text>

  <rect x="493" y="198" width="54" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="520" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">中等</text>
  <text x="520" y="232" text-anchor="middle" font-size="9" fill="#475569">单步检索</text>

  <rect x="551" y="198" width="54" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="578" y="216" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">复杂</text>
  <text x="578" y="232" text-anchor="middle" font-size="9" fill="#475569">迭代检索</text>

  <line x1="462" y1="242" x2="462" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="520" y1="242" x2="520" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="578" y1="242" x2="578" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="462" y1="260" x2="578" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="520" y1="260" x2="520" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="445" y="281" width="150" height="34" rx="6" fill="#1e293b"/>
  <text x="520" y="303" text-anchor="middle" font-size="12" fill="#ffffff">生成回答</text>

  <rect x="445" y="328" width="150" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="520" y="347" text-anchor="middle" font-size="10" fill="#475569">按需分配计算资源</text>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>