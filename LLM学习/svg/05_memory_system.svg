<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1100" height="650" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- 标题 -->
  <rect x="350" y="16" width="400" height="42" rx="8" fill="#1e293b"/>
  <text x="550" y="43" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Agent 记忆系统架构</text>

  <!-- ===== 工作记忆层 ===== -->
  <rect x="40" y="78" width="680" height="100" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="100" fill="#1e293b" font-size="14" font-weight="bold">工作记忆 (Working Memory)</text>
  <text x="60" y="116" fill="#475569" font-size="11">当前上下文窗口 | 容量有限（128K tokens）| 即用即弃</text>

  <rect x="60" y="128" width="170" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="145" y="151" text-anchor="middle" fill="#1e293b" font-size="12">System Prompt</text>

  <rect x="248" y="128" width="170" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="333" y="151" text-anchor="middle" fill="#1e293b" font-size="12">对话历史</text>

  <rect x="436" y="128" width="130" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="501" y="151" text-anchor="middle" fill="#1e293b" font-size="12">工具调用结果</text>

  <rect x="584" y="128" width="120" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="644" y="151" text-anchor="middle" fill="#1e293b" font-size="12">CoT 草稿区</text>

  <!-- 向下箭头 -->
  <line x1="380" y1="178" x2="380" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== 短期记忆层 ===== -->
  <rect x="40" y="200" width="680" height="105" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="222" fill="#1e293b" font-size="14" font-weight="bold">短期记忆 (Short-Term Memory)</text>
  <text x="60" y="238" fill="#475569" font-size="11">会话级 | 跨轮次但不跨会话 | Redis/内存缓存</text>

  <rect x="60" y="250" width="195" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="157" y="267" text-anchor="middle" fill="#1e293b" font-size="12">对话摘要</text>
  <text x="157" y="282" text-anchor="middle" fill="#475569" font-size="10">压缩历史，保留要点</text>

  <rect x="275" y="250" width="195" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="372" y="267" text-anchor="middle" fill="#1e293b" font-size="12">会话状态缓存</text>
  <text x="372" y="282" text-anchor="middle" fill="#475569" font-size="10">Redis/Memcached</text>

  <rect x="490" y="250" width="210" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="595" y="267" text-anchor="middle" fill="#1e293b" font-size="12">滑动窗口 + Token 计数</text>
  <text x="595" y="282" text-anchor="middle" fill="#475569" font-size="10">按 token 截断旧消息</text>

  <!-- 向下箭头 -->
  <line x1="380" y1="305" x2="380" y2="328" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== 长期记忆层 ===== -->
  <rect x="40" y="328" width="680" height="170" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="350" fill="#1e293b" font-size="14" font-weight="bold">长期记忆 (Long-Term Memory)</text>
  <text x="60" y="366" fill="#475569" font-size="11">跨会话持久化 | 向量数据库 + 知识图谱 | 三大类型</text>

  <!-- Episodic -->
  <rect x="60" y="378" width="200" height="105" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="60" y="378" width="200" height="30" rx="6" fill="#1e293b"/>
  <text x="160" y="398" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Episodic 情景记忆</text>
  <text x="70" y="424" fill="#475569" font-size="11">"用户上次问了 XX"</text>
  <text x="70" y="440" fill="#475569" font-size="11">具体交互事件记录</text>
  <text x="70" y="456" fill="#475569" font-size="11">存储: 向量数据库</text>
  <text x="70" y="472" fill="#475569" font-size="11">带时间戳、可衰减</text>

  <!-- Semantic -->
  <rect x="280" y="378" width="200" height="105" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="280" y="378" width="200" height="30" rx="6" fill="#1e293b"/>
  <text x="380" y="398" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Semantic 语义记忆</text>
  <text x="290" y="424" fill="#475569" font-size="11">"用户偏好 Python"</text>
  <text x="290" y="440" fill="#475569" font-size="11">结构化事实与概念</text>
  <text x="290" y="456" fill="#475569" font-size="11">存储: 知识图谱/KV</text>
  <text x="290" y="472" fill="#475569" font-size="11">实体关系抽取</text>

  <!-- Procedural -->
  <rect x="500" y="378" width="200" height="105" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="500" y="378" width="200" height="30" rx="6" fill="#1e293b"/>
  <text x="600" y="398" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Procedural 程序记忆</text>
  <text x="510" y="424" fill="#475569" font-size="11">"CSV处理标准流程"</text>
  <text x="510" y="440" fill="#475569" font-size="11">学到的工作流/技能</text>
  <text x="510" y="456" fill="#475569" font-size="11">存储: 代码/配置/DAG</text>
  <text x="510" y="472" fill="#475569" font-size="11">可重放执行</text>

  <!-- ===== 右侧：记忆读写流程 ===== -->
  <rect x="745" y="78" width="335" height="420" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="765" y="102" fill="#1e293b" font-size="14" font-weight="bold">记忆读写流程</text>

  <!-- 写入流程 -->
  <text x="765" y="128" fill="#475569" font-size="12" font-weight="bold">写入 (Memory Write)</text>

  <rect x="765" y="138" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="158" text-anchor="middle" fill="#1e293b" font-size="11">1. 重要性评分过滤（LLM 打分 1-10）</text>

  <line x1="912" y1="168" x2="912" y2="180" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="180" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="200" text-anchor="middle" fill="#1e293b" font-size="11">2. Embedding 向量化</text>

  <line x1="912" y1="210" x2="912" y2="222" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="222" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="242" text-anchor="middle" fill="#1e293b" font-size="11">3. 去重 + 冲突合并</text>

  <line x1="912" y1="252" x2="912" y2="264" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="264" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="284" text-anchor="middle" fill="#1e293b" font-size="11">4. 持久化到向量库/KG/KV</text>

  <!-- 读取流程 -->
  <text x="765" y="318" fill="#475569" font-size="12" font-weight="bold">读取 (Memory Retrieval)</text>

  <rect x="765" y="328" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="348" text-anchor="middle" fill="#1e293b" font-size="11">1. 语义检索（cosine similarity）</text>

  <line x1="912" y1="358" x2="912" y2="370" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="370" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="390" text-anchor="middle" fill="#1e293b" font-size="11">2. 时间衰减加权（越近越重要）</text>

  <line x1="912" y1="400" x2="912" y2="412" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="412" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="432" text-anchor="middle" fill="#1e293b" font-size="11">3. 重要性排序 + Top-K 截取</text>

  <line x1="912" y1="442" x2="912" y2="454" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="765" y="454" width="295" height="30" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="912" y="474" text-anchor="middle" fill="#1e293b" font-size="11">4. 注入工作记忆上下文窗口</text>

  <!-- 连接线：左侧三层到右侧读写 -->
  <line x1="720" y1="140" x2="745" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="720" y1="270" x2="745" y2="350" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="720" y1="430" x2="745" y2="430" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== 底部标注：框架选型 ===== -->
  <rect x="40" y="518" width="1040" height="118" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="542" fill="#475569" font-size="13" font-weight="bold">记忆框架选型对比</text>

  <rect x="60" y="554" width="310" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="215" y="574" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Mem0</text>
  <text x="215" y="590" text-anchor="middle" fill="#475569" font-size="11">自动提取记忆，无需手动管理</text>
  <text x="215" y="606" text-anchor="middle" fill="#475569" font-size="11">适合快速集成，API 简洁</text>
  <text x="215" y="618" text-anchor="middle" fill="#475569" font-size="10">add() / search() 两步完成</text>

  <rect x="395" y="554" width="310" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="550" y="574" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Zep</text>
  <text x="550" y="590" text-anchor="middle" fill="#475569" font-size="11">自动摘要 + 实体抽取 + 时间感知</text>
  <text x="550" y="606" text-anchor="middle" fill="#475569" font-size="11">企业级，内置知识图谱</text>
  <text x="550" y="618" text-anchor="middle" fill="#475569" font-size="10">适合需要结构化记忆的场景</text>

  <rect x="730" y="554" width="330" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="895" y="574" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Letta (MemGPT)</text>
  <text x="895" y="590" text-anchor="middle" fill="#475569" font-size="11">虚拟上下文管理，自动分页</text>
  <text x="895" y="606" text-anchor="middle" fill="#475569" font-size="11">类 OS 内存管理，最灵活</text>
  <text x="895" y="618" text-anchor="middle" fill="#475569" font-size="10">适合超长对话和复杂状态管理</text>
</svg>