<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'Segoe UI','Microsoft YaHei',system-ui,sans-serif">
  <rect width="520" height="340" fill="#ffffff" rx="12" stroke="#d1d5db"/>

  <text x="260" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Agent 记忆分层架构</text>

  <!-- 最内层: 工作记忆 -->
  <rect x="140" y="48" width="240" height="52" rx="8" fill="#1e293b"/>
  <text x="260" y="70" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">工作记忆 Working Memory</text>
  <text x="260" y="89" text-anchor="middle" font-size="11" fill="#e2e8f0">LLM Context Window 当前内容</text>

  <line x1="260" y1="100" x2="260" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- 短期记忆 -->
  <rect x="100" y="115" width="320" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="260" y="137" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">短期记忆 Short-term Memory</text>
  <text x="260" y="156" text-anchor="middle" font-size="11" fill="#475569">当前会话的对话历史 | 滑动窗口 / 摘要压缩</text>

  <line x1="260" y1="167" x2="260" y2="179" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- 长期记忆 -->
  <rect x="60" y="182" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="260" y="204" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">长期记忆 Long-term Memory</text>
  <text x="260" y="223" text-anchor="middle" font-size="11" fill="#475569">跨会话持久化 | 向量数据库 + 知识图谱</text>

  <line x1="260" y1="234" x2="260" y2="246" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- 情景记忆 -->
  <rect x="30" y="249" width="460" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="260" y="271" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">情景记忆 Episodic Memory</text>
  <text x="260" y="290" text-anchor="middle" font-size="11" fill="#475569">过去任务的经验教训 | few-shot 经验检索 | 策略优化</text>

  <!-- 右侧技术实现标注 -->
  <rect x="410" y="48" width="100" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="460" y="68" text-anchor="middle" font-size="10" fill="#475569">消息列表</text>
  <text x="460" y="84" text-anchor="middle" font-size="10" fill="#475569">Token 有限</text>

  <rect x="430" y="115" width="80" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="470" y="135" text-anchor="middle" font-size="10" fill="#475569">会话级</text>
  <text x="470" y="151" text-anchor="middle" font-size="10" fill="#475569">可清除</text>

  <rect x="470" y="182" width="40" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="490" y="212" text-anchor="middle" font-size="10" fill="#475569">DB</text>

  <!-- 底部管理策略 -->
  <rect x="30" y="308" width="460" height="26" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="260" y="326" text-anchor="middle" font-size="11" fill="#475569">管理策略: 窗口超长 → 摘要压缩 | 语义检索相关记忆 | 新经验写入、旧经验衰减</text>

  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>