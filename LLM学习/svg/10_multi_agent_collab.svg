<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <style>
    text { font-family: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowReturn" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="650" rx="12" fill="#ffffff" stroke="#d1d5db"/>

  <!-- 标题 -->
  <rect x="330" y="15" width="440" height="40" rx="8" fill="#1e293b"/>
  <text x="550" y="41" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">多 Agent 协作系统架构 (Supervisor 模式)</text>

  <!-- 用户请求入口 -->
  <rect x="430" y="68" width="180" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="520" y="89" text-anchor="middle" fill="#1e293b" font-size="13">用户任务请求</text>
  <line x1="520" y1="100" x2="520" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Supervisor Agent -->
  <rect x="300" y="120" width="440" height="80" rx="8" fill="#1e293b"/>
  <text x="520" y="150" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Supervisor Agent</text>
  <text x="520" y="172" text-anchor="middle" fill="#ffffff" font-size="11">任务分解 (Planning) · 子任务分配 (Dispatch) · 进度监控 (Monitor) · 结果聚合 (Aggregate)</text>
  <text x="520" y="190" text-anchor="middle" fill="#ffffff" font-size="10">状态机: PENDING → ASSIGNED → RUNNING → REVIEW → DONE / FAILED</text>

  <!-- 任务分配箭头（实线下行） -->
  <line x1="360" y1="200" x2="140" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="200" x2="350" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="200" x2="560" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="200" x2="770" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 结果返回箭头（虚线上行） -->
  <line x1="155" y1="280" x2="370" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowReturn)"/>
  <line x1="365" y1="280" x2="440" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowReturn)"/>
  <line x1="575" y1="280" x2="620" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowReturn)"/>
  <line x1="785" y1="280" x2="690" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowReturn)"/>

  <!-- 箭头图例 -->
  <line x1="70" y1="245" x2="120" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="249" fill="#475569" font-size="10">任务分配</text>
  <line x1="70" y1="262" x2="120" y2="262" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowReturn)"/>
  <text x="130" y="266" fill="#475569" font-size="10">结果返回</text>

  <!-- Worker Agents 层 -->
  <!-- Research Agent -->
  <rect x="60" y="280" width="180" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="75" y="288" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="150" y="308" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Research Agent</text>
  <text x="150" y="338" text-anchor="middle" fill="#475569" font-size="11">信息检索与整合</text>
  <text x="150" y="355" text-anchor="middle" fill="#475569" font-size="10">工具: Web Search / RAG</text>

  <!-- Code Agent -->
  <rect x="270" y="280" width="180" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="285" y="288" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="360" y="308" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Code Agent</text>
  <text x="360" y="338" text-anchor="middle" fill="#475569" font-size="11">代码生成与执行</text>
  <text x="360" y="355" text-anchor="middle" fill="#475569" font-size="10">工具: IDE / Sandbox / Git</text>

  <!-- Review Agent -->
  <rect x="480" y="280" width="180" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="495" y="288" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="570" y="308" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Review Agent</text>
  <text x="570" y="338" text-anchor="middle" fill="#475569" font-size="11">质量审查与反馈</text>
  <text x="570" y="355" text-anchor="middle" fill="#475569" font-size="10">工具: Linter / 规则引擎</text>

  <!-- Test Agent -->
  <rect x="690" y="280" width="180" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="705" y="288" width="150" height="30" rx="4" fill="#1e293b"/>
  <text x="780" y="308" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Test Agent</text>
  <text x="780" y="338" text-anchor="middle" fill="#475569" font-size="11">测试生成与验证</text>
  <text x="780" y="355" text-anchor="middle" fill="#475569" font-size="10">工具: 测试框架 / CI/CD</text>

  <!-- Agent间通信（Review反馈给Code） -->
  <line x1="480" y1="340" x2="450" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowReturn)"/>
  <text x="465" y="335" text-anchor="middle" fill="#475569" font-size="9">反馈</text>

  <!-- 共享资源层 -->
  <rect x="60" y="400" width="810" height="95" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="465" y="422" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">共享基础设施</text>

  <rect x="80" y="435" width="155" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="157" y="455" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">共享记忆</text>
  <text x="157" y="472" text-anchor="middle" fill="#475569" font-size="10">短期(Redis) + 长期(DB)</text>

  <rect x="255" y="435" width="155" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="332" y="455" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">工具注册表</text>
  <text x="332" y="472" text-anchor="middle" fill="#475569" font-size="10">MCP Server / 能力声明</text>

  <rect x="430" y="435" width="155" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="507" y="455" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">消息总线</text>
  <text x="507" y="472" text-anchor="middle" fill="#475569" font-size="10">Kafka / Redis Pub-Sub</text>

  <rect x="605" y="435" width="155" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="682" y="455" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">状态存储</text>
  <text x="682" y="472" text-anchor="middle" fill="#475569" font-size="10">LangGraph State / 检查点</text>

  <!-- 连接线从Worker到共享资源 -->
  <line x1="150" y1="370" x2="150" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="370" x2="360" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="570" y1="370" x2="570" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="780" y1="370" x2="780" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 右侧错误恢复机制 -->
  <rect x="900" y="120" width="180" height="250" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="990" y="148" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">错误恢复机制</text>
  <line x1="920" y1="158" x2="1060" y2="158" stroke="#e2e8f0"/>

  <rect x="920" y="170" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="990" y="185" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">L1: 自动重试</text>
  <text x="990" y="199" text-anchor="middle" fill="#475569" font-size="10">指数退避 / 3次上限</text>

  <line x1="990" y1="205" x2="990" y2="220" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="920" y="220" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="990" y="235" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">L2: 任务降级</text>
  <text x="990" y="249" text-anchor="middle" fill="#475569" font-size="10">换Agent / 简化任务</text>

  <line x1="990" y1="255" x2="990" y2="270" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="920" y="270" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="990" y="285" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">L3: 人工介入</text>
  <text x="990" y="299" text-anchor="middle" fill="#475569" font-size="10">HITL审批 / 人工接管</text>

  <line x1="990" y1="305" x2="990" y2="320" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="920" y="320" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="990" y="335" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">L4: 安全终止</text>
  <text x="990" y="349" text-anchor="middle" fill="#475569" font-size="10">回滚状态 / 告警通知</text>

  <!-- 连线到右侧 -->
  <line x1="870" y1="310" x2="900" y2="290" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 底部协作模式对比 -->
  <rect x="60" y="515" width="980" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="540" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">三种协作模式对比</text>

  <!-- Supervisor 模式 -->
  <rect x="80" y="555" width="280" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="220" y="575" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Supervisor 模式</text>
  <text x="220" y="593" text-anchor="middle" fill="#475569" font-size="11">中心化调度，Supervisor统一管理</text>
  <text x="220" y="610" text-anchor="middle" fill="#475569" font-size="10">适用: 流程明确的复杂任务 (如软件开发)</text>

  <!-- Handoff 模式 -->
  <rect x="390" y="555" width="280" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="530" y="575" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Handoff 模式</text>
  <text x="530" y="593" text-anchor="middle" fill="#475569" font-size="11">Agent间直接传递控制权</text>
  <text x="530" y="610" text-anchor="middle" fill="#475569" font-size="10">适用: 线性流转场景 (如客服转接)</text>

  <!-- Debate 模式 -->
  <rect x="700" y="555" width="280" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="840" y="575" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Debate 模式</text>
  <text x="840" y="593" text-anchor="middle" fill="#475569" font-size="11">多Agent辩论达成共识</text>
  <text x="840" y="610" text-anchor="middle" fill="#475569" font-size="10">适用: 需要多视角决策 (如方案评审)</text>
</svg>